# --- consumer: render list -> GPU quads ---
"0x821FC5E8" = { name = "ms_render_list_flush" }         # drain: walk the sorted layer array ([mgr+0x4800], count [mgr+0x5402]); for each layer set its alpha, then walk its 0x68-byte sprite entries, switching texture/palette on change, and emit each via ms_render_emit_sprite_quad. Brackets the run with ms_reset_quad_list / ms_flush_quad_list
"0x82207450" = { name = "ms_render_emit_sprite_quad" }   # (entry-quad ptr r3 = entry+0x08, layer r4, entry+0x02 halfword r5) convert one already-baked 0x68 sprite entry to a textured quad and enqueue via ms_queue_textured_quad (0x823F7C30). FIELD DECODE (offsets are entry-relative; emit's r3 = entry+0x08): reads the per-object alpha [0x82D7D66C] (5-bit, 0..31), scales to 0..255 via (a>=31?255:a*255/31), folds it into the global quad modulate color through ms_set_quad_modulate_color (0x823F8530, stored at [0x82C0B28C]); then reads the entry's baked vertex floats -- POSITIONS at entry+0x08/+0x0C (v0 x/y), +0x14/+0x18, +0x38/+0x3C... and UVs at +0x20.., +0x50.. -- multiplies positions by the const at [0x82007580] and UVs by [0x820037C4], converts to packed 16.16/16-bit, and writes the host quad. Positions are ABSOLUTE screen coords (camera pre-applied). The packed params word at entry+0x1C carries the alpha bits (read per-layer by ms_render_set_object_alpha) + texture color; entry+0x04 = texture/palette id.
"0x823F8530" = { name = "ms_set_quad_modulate_color" }    # (a r3, r4, r5, r6) pack ARGB into one word and store the global vertex modulate color at [0x82C0B28C] (getter = 0x823F8550); ms_render_emit_sprite_quad calls it to apply the per-object alpha scale to the quad
"0x82207170" = { name = "ms_render_bind_texture_palette" } # tail-call 0x823F79E0; bind a sprite entry's texture/palette -- called by ms_render_list_flush only when the entry's [+0x04] texture id changes from the cached one
"0x82207160" = { name = "ms_render_batch_begin" }          # tail-call ms_reset_quad_list (0x823F7C10); reset the quad batch before draining the list
"0x82207180" = { name = "ms_render_batch_end" }            # tail-call ms_flush_quad_list (0x823F8030); flush the final quad batch after draining the list
"0x82206DB0" = { name = "ms_render_layer_stamp_texture" }  # per-layer PRE-pass (first loop of ms_render_list_flush): walk the layer's [+0x05]-count 0x68-byte entries, stamp each entry's texture/palette id at [+0x04] from the layer record and propagate the [+0x00] halfword to [+0x02], stride 0x68
"0x82206D90" = { name = "ms_render_reset_draw_counters" } # zero the per-frame quad/draw counters [0x82DAA61C] and [0x82DAC380]
"0x82206E38" = { name = "ms_render_set_object_alpha" }    # extract the object alpha bits, store the global per-object alpha scale at [0x82D7D66C], return whether the object is visible
"0x82207168" = { name = "ms_render_set_layer_alpha" }    # set the current layer alpha for the sprite batcher (tail-call into 0x823F7028)

# --- camera/scroll "tracked object" cluster (RE'd 2026-06-24) ---
# Two scene-graph globals hold the object(s) the camera/scroll system references:
#   0x82D8B124  tracked object A -- read by ms_tick_flag_gated_obj_lookup and the
#               on-screen marker state machine; reset to sentinel 0x82BD7BE8.
#   0x82D8B130  tracked object B -- the camera FOLLOW reference; set in
#               ms_gameplay_init, advanced each frame toward the scroll limit.
# Relevant to the 60fps goal as the scroll-INPUT side: these define what the
# camera/scroll tracks, i.e. the input ms_world_advance_scroll smooths each tick.
# (The render-time world->screen camera is still constant per
# ms_render_list_add_sprite, so interpolating the pose alone remains sufficient.)
"0x82236d60" = { name = "ms_render_set_tracked_object" }        # store the follow reference at 0x82D8B130 (null -> sentinel 0x82BD7BF4); called by ms_gameplay_init
"0x82236d88" = { name = "ms_render_reset_tracked_object_state" } # stage-init reset: object A at 0x82D8B124 (null -> sentinel 0x82BD7BE8) + the 0x82D8B128/2C/34/38 fields + flags 0x82D27650=0 / 0x82D27651=-1
"0x82236de8" = { name = "ms_render_tracked_marker_enabled" }    # return 255 if the marker-active flag 0x82D27651 is set, else 0
"0x82236e08" = { name = "ms_render_advance_tracked_object" }    # walk object B (0x82D8B130) forward through the depth-sorted sibling list (key +0x12) to the first node at/after the scroll limit 0x82D7466C; store it back
"0x82236e48" = { name = "ms_render_project_record_xy" }         # (record r3, out_x r4, out_y r5): write record+0/+2 (x/y) to *r4/*r5, then conditionally add camera X (0x82D74750) per record+0x4 bit1 / camera Y (0x82D74754) per bit0

# --- per-frame orchestration ---
"0x823F9C78" = { name = "ms_render_frame" }   # (do_scene r3): when do_scene!=0, set up the 320x240 playfield target (0x823E6F60) -> ms_scene_render -> finish (0x823E7018); ALWAYS bumps the global frame counter [0x82D2A860] and runs ms_task_scheduler (+ 0x823E42B0). Called once per game tick by ms_update_and_render_frame, which passes do_scene=255 only on the first loop pass.
"0x82250390" = { name = "ms_scene_render" }   # render the scene into the playfield: configure the viewport/border, flush page/effect queues and the foreground sprite list, then call ms_background_draw_tile_sprite_batches at 0x822508A4 for the background/tile pass.
# The other two legs of ms_render_frame's do_scene trio (bl @0x823f9cb0/b8), named
# so the 60fps off-pass driver can REX_IMPORT and re-invoke them to re-draw the
# lerped scene into the 320x240 EDRAM. Both are void() at the call site (no args set).
# ms_setup_playfield_target reads the global playfield state at 0x82C0B204:
#   SetRenderTarget(0, [state+0x04]) -> SetDepthStencilSurface([state+0x0C])
#   -> Clear(flags=0x1F, color=0xFF000000) -> render-state setup.
# It does NOT consult the render-task manager at 0x82D41A70; the scene target
# descriptor inputs are the explicit color/depth surface pointers above.
"0x823E6F60" = { name = "ms_setup_playfield_target" }   # bind the 320x240 scene color/depth surfaces from 0x82C0B204 and clear before ms_scene_render
"0x823E7018" = { name = "ms_finish_playfield_render" }  # post-scene device bookkeeping (state sets + bl 0x8243b7d8(r4=256) + [ctx+1]=1)
"0x82250A38" = { name = "ms_scene_update" }   # ONE FRAME PER CALL, re-entered per frame (CORRECTED 2026-06-24, Blocker 1 -- supersedes the earlier "per-SCENE main loop" reading). TOP (0x82250a48) calls ms_render_list_begin_frame ONCE; loop body at 0x82250a88 calls ms_update_and_render_frame (one rendered frame) + scene state machine + input poll; then ms_scene_substate_step (0x8223c6c8 @0x82250bd0) returns the new sub-state byte. COMMON PATH: it returns 1 (its default, 0x8223c810) -> bne @0x82250be8 taken -> block 0x82250c88 bumps the frame counters, runs ms_pose_tick_advance (0x8223e5b0) + ms_render_list_clear (0x82236b88) + ms_reset_current_global_node, then RETURNS (0x82250d18). So steady state = EXACTLY ONE rendered frame per call. The back-edges to 0x82250a88 (0x82250c14/0x82250c54) fire ONLY when 0x8223c6c8 returns 0 (rare non-advancing sub-step); teardown exit 0x82250c58 only when ms_scene_should_exit (0x821F1888) is nonzero. PROOF of one-frame-per-call: begin_frame (finalize+zero list) is at the TOP outside the loop and the loop body has NO list-zero call, so a multi-frame internal loop would leave frames 2..N un-zeroed. Re-entered every frame via scene table 0x8200750c -> ms_scene_state_run (0x82250d20) -> ms_scene_update.

# --- frame/tick driver (cadence RESOLVED 2026-06-24; full write-up in the MD) ---
# CALL STACK (top->bottom):
#   scene-descriptor table @0x82007508  (data-driven; run_fn @0x8200750c)
#     -> ms_scene_state_run    0x82250d20  (scene-table run thunk: refresh type-tag +
#                                           HUD/root state, then calls scene_update)
#        -> ms_scene_update     0x82250a38  (ONE FRAME per call, re-entered per frame)
#           -> ms_update_and_render_frame 0x82250988  (ONE rendered frame, N passes)
#              -> N x ms_render_frame      0x823f9c78  (N = [0x82D29BA2], =2)
#                 pass 0: do_scene=255 -> ms_scene_render -> re-flush of the list
#                 pass>=1: do_scene=0   -> scheduler/update only, re-present pass 0
#                 every pass: ms_task_scheduler + ms_pump_render_queue, which yield
#                             to the RENDER TASK FIBER (ms_render_task_fiber 0x823e4378)
# The PRODUCER BUILD is NOT a synchronous callee of ms_update_and_render_frame: it runs
# on the scheduler-driven render-task fiber (0x823e4378), advanced cooperatively by
# ms_render_frame -> ms_task_scheduler / ms_pump_render_queue. The fiber's per-frame
# body ms_render_task_draw_frame (0x823dfef0) runs the producer DRAW walk to completion
# via the dispatcher ms_scene_draw_dispatch (0x822500b0, gated on draw-state byte
# 0x82D7D615) -> ms_obj_draw_dispatch_step (0x822068f8), interleaved with present. So
# producers @30Hz, present @60Hz. Off-pass interp plan in MSXX_60FPS_FUNCTION_TARGETS.md.
"0x82250988" = { name = "ms_update_and_render_frame" }   # ONE rendered frame: pumps update subsystems (incl. ms_sound_update_event_queue 0x822056A8) then ms_render_frame per pass, iterating [0x82D29BA2] (=2) passes; do_scene = (r31==0?255:0) computed at 0x822509e4-ec so the scene re-flush runs on pass 0 only. Pass index r31 (advanced by [0x82DD0D80]) + count [0x82D29BA2] = the inter-tick phase for interpolation.
"0x823E42B0" = { name = "ms_pump_render_queue" }   # per-pass render barrier (called at the tail of ms_render_frame): while ([[0x82D41B40]+0x24C] & 1) { clear the pending bit; ms_task_scheduler() } -- yields to the scheduler-driven render task (ms_render_task_fiber 0x823e4378) until its pending-work flag drains. This is where the off-thread present completes; it is why scene-draw is 30Hz but swap is 60Hz.
"0x821f2078" = { name = "ms_offpass_update_dispatch" }   # the OFF-PASS-ONLY update call (gated on r31!=0 @0x822509c0 in ms_update_and_render_frame). Decoded 2026-06-24 (60fps Blocker 3, benign): a thin dispatcher on the scene-phase byte [0x82DD00E0] -- calls update routine 0x821f1e18(r3,r4=0) once (r3=1) normally, or twice (r3=0 then r3=1) when the phase is 7 or 8 (cmplwi 8/7 @0x821f208c/94). Touches NO render list and NO present, so repurposing the off-pass for the interpolation replay is safe; run the clear+replay+forced-render AFTER it.
"0x82250900" = { name = "ms_render_set_pass_count" }      # store the pass-count byte at 0x82D29BA2; sibling of ms_render_get_pass_count and the reset helper below.
"0x82250910" = { name = "ms_render_get_pass_count" }      # return the pass-count byte at 0x82D29BA2; ms_update_and_render_frame uses this as the r31 loop bound/divisor (=2 in-game).
"0x82250920" = { name = "ms_render_inc_pass_count" }      # increment and return the 0x82D29BA2 pass-count byte; called by scene/frontend setup paths outside the steady in-game loop.
"0x82250950" = { name = "ms_render_reset_pass_state" }    # reset the adjacent 0x82D29BA0/A2/A4/A6 pass-state bytes/halfwords and seed 0x82D29BA2=2 before the scene draw/update loop.

# --- render-task present fiber / present-side transition loop (RE'd 2026-06-25) ---
"0x823E41D0" = { name = "ms_render_task_present_fiber" } # sibling cooperative fiber to ms_render_task_fiber: waits for [0x82D2A8B0], loops { ms_render_task_draw_present_transition ; ms_present_playfield_upscale ; ms_task_scheduler } until [0x82D2A8B4] is set, then runs one final present, resets D3D state, calls slot +0x14, clears the rendered flag, and yields
"0x823DEFE8" = { name = "ms_render_task_call_slot14" } # tail wrapper for [0x82D41B40] vtable+0x14; same callback slot ms_render_task_fiber invokes before ms_render_task_draw_frame
"0x823DF0C8" = { name = "ms_render_task_draw_present_transition" } # state-dependent present prep keyed by [0x82C0AB74] and alpha/timer [0x82D2A898]; binds saved targets, draws the transition/backdrop helpers, then resets playfield present state
"0x823DF5A0" = { name = "ms_render_present_transition_state_step" } # transition state machine called from scene logic; advances [0x82C0AB74]/[0x82D2A898], calls ms_render_frame(0), and drives fade/audio helpers during render-state transitions

# --- render-task scene snapshot / resolve-adjacent dispatch (RE'd 2026-06-25, P2/P3) ---
# The dynamic call in ms_render_task_draw_frame is [0x82D41A70]->vtable+0x10.
# Startup stores the render-core subobject at main_object+0x288 into 0x82D41A70;
# that subobject's vtable is 0x8202BF78, whose +0x10 slot resolves to 0x823E6460.
# This layer snapshots/restores live scene globals and services pending async scene
# work around the producer drain; it is adjacent to, but not yet the raw EDRAM bind.
#
# Constructor 0x823FBDB0 publishes the larger render-core singleton's subobjects:
#   [0x82D41B40] = 0x82D2EE38 render-task global state record
#   [0x82D41A70] = this+0x288, vtable 0x8202BF78 (the bctrl target below)
#   [0x82D418F0] = this+0x8E8, sibling with the same 0x8202BF78 vtable
#   [0x82D418F4] = this+0x1218, [0x82D418E4] = this+0x12B0
# Important negative result for the EDRAM question: this object does not select the
# 320x240 scene RT tile. The actual target bind uses the playfield state surfaces at
# 0x82C0B204+0x04/+0x0C through ms_setup_playfield_target.
"0x823FBDB0" = { name = "ms_render_core_ctor_publish_globals" } # constructs the render core and publishes the 0x82D41A70/0x82D41B40/0x82D418xx globals
"0x823E6460" = { name = "ms_render_task_service_scene_resolve" } # vtable +0x10 for [0x82D41A70]; drains +0x658/+0x65C pending flags, calls snapshot/apply slots, waits on 0x8257B6C8
"0x823E6350" = { name = "ms_render_task_apply_scene_snapshot_and_wait" } # vtable +0x0c; snapshots live scene state via +0x00, waits on 0x8257B380, clears 0x82D2A8F4
"0x823E4EA0" = { name = "ms_render_task_snapshot_scene_state" } # vtable +0x00; copy current scene globals into [0x82D41A70] snapshot fields
"0x823E5010" = { name = "ms_render_task_restore_scene_state" } # vtable +0x04; restore/apply [0x82D41A70] snapshot fields back to scene globals
"0x823E53F8" = { name = "ms_render_task_scene_state_changed" } # compare [0x82D41A70] snapshot fields against live scene globals; returns dirty/nonzero
"0x823E5160" = { name = "ms_render_task_get_snapshot_mode_byte" } # vtable +0x20; returns the saved byte at this+0x609
"0x823E5168" = { name = "ms_render_task_build_scene_status_descriptor" } # vtable +0x24; fills a small status descriptor from this+0x604 and [0x82D41B40]+0x230
"0x823E53E8" = { name = "ms_render_task_pack_scene_descriptor_flags" } # vtable +0x28; tail wrapper into the descriptor flag packer at 0x823FA4E8
"0x823FAB88" = { name = "ms_render_task_get_normalized_scene_status_x" } # vtable +0x18; reads the 0x82DD00C6 byte via 0x823DF190 and divides by the X dimension table value - 1
"0x823FABE0" = { name = "ms_render_task_get_normalized_scene_status_y" } # vtable +0x1C; reads the 0x82DD00C7 byte via 0x823DF198 and divides by the Y dimension table value - 1
"0x823E51E8" = { name = "ms_render_task_mark_scene_state_dirty" } # sets [0x82D41B40]+0x8e0 to 0xff before the service pass
"0x823E5200" = { name = "ms_render_task_clear_scene_state_dirty" } # clears [0x82D41B40]+0x8e0 after the service pass
"0x823E5D10" = { name = "ms_render_task_init_scene_snapshot_state" } # initializes snapshot/resolve state fields around +0x610..+0x65c, including pending flags
"0x823FA4E8" = { name = "ms_render_task_pack_scene_status_flags" } # packs the scene/status descriptor bits into the flag word returned through the vtable +0x28 wrapper
"0x823FA7E0" = { name = "ms_render_task_release_common_resources" } # common release path for resource pointers owned by render-task subobjects
"0x823FB8A8" = { name = "ms_render_task_common_state_ctor" } # common subobject ctor: sets base vtable and initializes event/resource state fields
"0x823FBB68" = { name = "ms_render_task_noop_slot_08" } # vtable +0x08 stub for the 0x82D41A70 subobject
"0x823FBB70" = { name = "ms_render_task_noop_slot_14" } # vtable +0x14 stub for the 0x82D41A70 subobject
"0x823FBB78" = { name = "ms_render_task_snapshot_object_size" } # vtable +0x2C; returns 0x64C, matching the snapshot object footprint through +0x65C flags
"0x823FAC40" = { name = "ms_render_task_get_inner_state" } # vtable +0x30; returns this+0x08
"0x823FBB80" = { name = "ms_render_task_noop_slot_38" } # vtable +0x38 stub for the 0x82D41A70 subobject
