"0x82236D40" = { name = "ms_obj_clear_sprite_link_flag" }       # clear obj+0x24 bit2 and set obj+0x2A=1; used by object reset and child/overlay setup paths
"0x82220160" = { name = "ms_obj_get_render_anchor_xy" }         # write sprite anchor X/Y: null object gives camera center (+160,+120), otherwise pose+0x18/+0x1C plus optional mirrored cel bounds
"0x82220328" = { name = "ms_obj_copy_sprite_render_flags" }     # copy draw halfwords and sprite flag bits from source object to child; also copies obj+0x2A mode byte
"0x8221F6E0" = { name = "ms_obj_place_child_pose_relative" }    # set a child pose relative to a parent object with X/Y offsets, accounting for the global render origin, then ms_pose_commit
"0x822207A8" = { name = "ms_obj_attach_sprite_child_relative" } # copy sprite flags to child, mirror offsets for h/v flip, place child relative to parent, and return the child

# ---------------------------------------------------------------------------
# POSE / TRANSFORM — 16.16 motion commit + NATIVE prev-position SNAPSHOT
# (RE'd 2026-06-24, P3 in MSXX_60FPS_FUNCTION_TARGETS.md). ***Headline 60fps
# find: the prev/current position pair the interpolator needs ALREADY EXISTS in
# the pose struct — the game maintains it natively, per logic tick.***
#
# The "pose" is the draw sub-struct at obj+0x88 (the one ms_render_list_add_sprite
# reads). Full field layout decoded from this family:
#   +0x00  back-ptr to owner object
#   +0x04  logical X  (s32, 16.16 fixed)   <- gameplay writes/integrates THIS
#   +0x08  logical Y  (s32, 16.16 fixed)
#   +0x0c  X velocity (s32, 16.16) added to +0x04 by the integrate variants
#   +0x10  Y velocity (s32, 16.16) added to +0x08
#   +0x14  parent/reference pose ptr (0 = world-space; else transform is relative)
#   +0x18  COMMITTED X (s32, 16.16)   <- renderer's `lhz pose+0x18` = HIGH half = int X
#   +0x1c  COMMITTED Y (s32, 16.16)   <- renderer's `lhz pose+0x1c` = HIGH half = int Y
#   +0x20  PREV-tick committed X (s32, 16.16)  <<< interpolation "prev" >>>
#   +0x24  PREV-tick committed Y (s32, 16.16)  <<< interpolation "prev" >>>
#   +0x28  snapshot tick stamp (u8; == the toggle 0x82D74896 when +0x20/+0x24 last refreshed)
#   +0x29  flip flags (bit0 hflip, bit1 vflip) — renderer reads this; SNAP, don't lerp
#
# ms_pose_commit (0x8223e600) is the core every setter/integrator tail-calls. It:
#   (1) if +0x14!=0, folds the parent's committed pos (+parent flip) into the
#       logical pos to get world-space committed pos (carry-corrected halfword add);
#   (2) writes the new committed pos to +0x18/+0x1c and flip to +0x29;
#   (3) SNAPSHOTS: on the FIRST commit (+0x28==0) prev:=current; afterwards, when
#       the per-tick toggle [0x82D74896] differs from +0x28, it copies the OLD
#       +0x18/+0x1c (read at entry, i.e. last tick's value) into +0x20/+0x24 and
#       restamps +0x28. So between tick boundaries +0x20/+0x24 is frozen at the
#       previous tick's position while +0x18/+0x1c holds the current tick's.
#
# 0x82D74896 (u8) is the SIM-TICK marker: ms_pose_tick_advance (0x8223e5b0)
# alternates it 1<->2 (writes (old&1)+1) so consecutive ticks always differ. It is
# called EXACTLY ONCE per common scene-update frame at 0x82250cd4 (right beside
# ms_render_list_clear) => it toggles at the 30Hz producer/logic rate. (Also a
# clean P6 phase-BOUNDARY signal, though not itself monotonic.)
#
# CONSEQUENCE FOR 60fps (supersedes the GAMEPLAY LOGIC TICK section's "manually
# snapshot every live pose on ms_gameplay_tick entry/exit" plan): NO side-table and
# NO object-identity/recycling handling (the P4 worry) is needed for POSITION. The
# interpolator reads BOTH endpoints straight from the pose: prev = pose+0x20/+0x24,
# current = pose+0x18/+0x1c, lerp the full 16.16 by the inter-tick phase, take the
# high half, then add the caller's constant xoff/yoff (camera cancels — same offset
# applies to both endpoints, so it stays a constant additive term). This is render-
# lag interpolation (renders 1 tick behind), the standard correct form.
#
# VERIFICATION 2026-06-24 (instruction-level, closes 60fps Blockers 2b + 4):
#   * FIELD WIDTH: +0x18/+0x1c AND +0x20/+0x24 are written with stw (32-bit 16.16) at
#     0x8223e694/9c/ac/b0 -- NOT sth. Interpolator reads lwz; renderer's lhz +0x18 is
#     the high (integer) halfword on BE. (Blocker 4 RESOLVED.)
#   * SPAWN SEED: ms_pose_clear zeroes +0x28 (stb @0x8223e5f0), so the first commit
#     after spawn takes the +0x28==0 seed path (0x8223e6a4) -> prev:=current -> no
#     spawn-frame streak, no host guard needed. (Blocker 2b RESOLVED.)
#   * OPEN (Blocker 2a, runtime): direct +0x18/1c writers bypass the snapshot
#     (ms_pose_set_position 0x8223e7f0, ms_set_global_node_position 0x82206a48). If a
#     MOVING entity uses them its prev goes stale -> streak. Confirm via the
#     commit-coverage probe (diagnostic B); fall back to a host side-table prev only
#     for any bypassers found.
"0x8223e600" = { name = "ms_pose_commit" }                # pose r3: fold parent transform -> write committed 16.16 pos (stw, 32-bit) to pose+0x18/+0x1c & flip to pose+0x29, and snapshot PREV committed pos into pose+0x20/+0x24 once per tick (keyed on toggle 0x82D74896; first commit after a 0-cleared +0x28 seeds prev:=current). THE native prev/current generator for interpolation. (width + spawn-seed instruction-verified 2026-06-24.)
"0x8223e5b0" = { name = "ms_pose_tick_advance" }          # advance the per-tick snapshot toggle 0x82D74896 (writes (old&1)+1, i.e. alternates 1<->2 so consecutive ticks differ); called once per common scene-update frame @0x82250cd4 = the 30Hz sim-tick boundary
"0x8223e5c8" = { name = "ms_pose_clear" }                 # pose r3: zero every pose field (+0x04..+0x29 incl. logical/committed/prev/flip); leaves owner back-ptr untouched
"0x8223e6f0" = { name = "ms_pose_integrate_commit" }      # pose r3: pose+0x04 += pose+0x0c (X vel), pose+0x08 += pose+0x10 (Y vel), then ms_pose_commit
"0x8223e718" = { name = "ms_pose_compute_relative" }      # (pose r3, pose r4, inout_prevX r5, inout_prevY r6, inout_deltaX r7, inout_deltaY r8): adds pose r3's pos (minus pose r4's) to the four in/out words, then rewrites them as {[r5],[r6]} = PREV pos (pose+0x20/+0x24 relative) and {[r7],[r8]} = (current pose+0x18/+0x1c) - PREV = per-tick DELTA. So the game itself decomposes pose motion into prev + delta (the same pair an interpolator wants). No-op when r3==r4.
"0x8223e7b0" = { name = "ms_pose_reset" }                 # obj r3: deref pose (obj+0x88), set pose+0 = owner back-ptr, zero all motion/committed/prev/flip fields
"0x8223e7f0" = { name = "ms_pose_set_position" }          # (pose r3, parent r4, x r5, y r6): x/y given as INTEGERS (stored <<16 into +0x04/+0x08), clear flip, then commit
"0x8223e818" = { name = "ms_pose_set_position_fixed" }    # (pose r3, parent r4, x r5, y r6): x/y given as raw 16.16 into +0x04/+0x08, clear flip, then commit
"0x8223e838" = { name = "ms_pose_apply" }                 # obj r3: deref pose (obj+0x88) and ms_pose_commit it (no motion integration) — the per-frame commit the object handlers call before add_sprite
"0x8223e840" = { name = "ms_pose_integrate_commit_obj" }  # obj r3: deref pose then ms_pose_integrate_commit (obj-arg variant of 0x8223e6f0)
"0x8223e868" = { name = "ms_pose_set_position_obj" }      # (obj r3, parent r4, x r5, y r6): deref pose then ms_pose_set_position (obj-arg variant of 0x8223e7f0)

# Per-type sprite/animation template bind (RE'd 2026-06-24, P3). Sets the obj's
# sprite-table base that ms_render_list_add_sprite indexes for the frame entry.
"0x822050e8" = { name = "ms_obj_set_type" }               # (obj r3, type r4): if obj+0x40 (current type) != r4, look up the per-type template (20-byte stride table ~0x82DA9560 keyed by type) and bind obj+0x38 (sprite-table base read by add_sprite), obj+0x34, obj+0x3c; bump the per-type live counter; store obj+0x40 = type. No-op + returns 255 if unchanged.

# ---------------------------------------------------------------------------
# ANIMATION — cel-index advance (RE'd 2026-06-24, P5 in
# MSXX_60FPS_FUNCTION_TARGETS.md: "where the per-object sprite-frame index lives
# and is advanced — confirm it is independent of pose+0x18/+0x1c, i.e. SNAP not
# lerp"). ***P5 ANSWER: CONFIRMED INDEPENDENT.*** The cel/frame index reaches
# ms_render_list_add_sprite as its r4 sprite-id arg (decoded P3): r4 indexes the
# object's STATIC per-type frame table obj+0x38 ((id+4)*4 -> ms_bswap32 -> frame-
# record ptr). r4 has NOTHING to do with the pose (obj+0x88) the renderer reads
# for POSITION — the two are wholly separate inputs to add_sprite. Across all 26
# add_sprite call sites, r4 is ALWAYS one of: a literal constant (static pose,
# e.g. 139/141/144), a static-table lookup, or a value derived from a per-object
# FRAME-TIME counter — NEVER from pose+0x18/+0x1c. => the cel index advances on
# the 30Hz animation clock and must SNAP; only the pose position interpolates.
#
# TWO concrete cel-advance mechanisms were decoded as witnesses:
#
# (A) The SHARED animation-SCRIPT player (the game's main animated-object class,
#     entity type 49; its tiny per-animation setter thunks at ~0x8222D8F0..DAxx
#     each `b ms_anim_set_script` with a {framelist_len, framelist_ptr} pair). An
#     "animation" is a list of FRAME RECORDS; the per-object animation state lives
#     in the extended state struct at obj+0xC0:
#       state+0x20  current animation FRAME-RECORD pointer
#       state+0x2a  current frame's DURATION countdown (u8, ticks remaining)
#       state+0x28  remaining lifetime (u16, frames) — frees the obj at 0
#     Frame-record layout (read by ms_anim_apply_current_frame):
#       +0x01  duration (ticks this cel is held)         +0x04/+0x06  X velocity delta
#       +0x08/+0x0a  Y velocity delta                    +0x0d  cel-source mode
#       +0x10  CEL descriptor (the sprite, or an index into a cel list when +0x0d!=0)
#     Per tick ms_anim_tick decrements state+0x2a; on expiry it reloads the
#     duration from the (advanced) frame's +0x01 and calls
#     ms_anim_apply_current_frame, which folds the frame's velocity deltas into the
#     pose (pose+0x0c/+0x10, flip-adjusted) and instantiates that frame's CEL as a
#     child sprite node (ms_obj_spawn_sprite_child). So the cel is LATCHED at the
#     frame-advance (30Hz logic), never per render — fully decoupled from position.
"0x8222c980" = { name = "ms_anim_set_script" }            # (obj r3, framelist_len r4, framelist_ptr r5): bind the animated-object template (ms_obj_set_type type=49), store the animation framelist on the obj, seed pose velocity from the first frame. Funnel target of the ~40 per-animation `b 0x8222c980` setter thunks at ~0x8222D8F0+ (each passes a fixed {len, framelist}).
"0x8222c2f0" = { name = "ms_anim_apply_current_frame" }   # obj r3: read the current animation frame record ([obj+0xC0]+0x20); fold the frame's X/Y velocity deltas (frame+0x04..0x0a, flip-adjusted) into pose+0x0c/+0x10; then INSTANTIATE the frame's cel as a child sprite node (cel = frame+0x10, or an indexed cel-list lookup when frame+0x0d!=0) via ms_obj_spawn_sprite_child. This is where the cel index is selected — on the animation clock, not from position.
"0x8222cbb8" = { name = "ms_anim_tick" }                  # obj r3: per-tick animation update (a node+0x08 state handler for type 49). Decrement the current frame's duration countdown ([obj+0xC0]+0x2a); on expiry reload it from the frame's +0x01 and call ms_anim_apply_current_frame (advance cel). Also decrement the lifetime counter ([obj+0xC0]+0x28) and free the object via ms_obj_pool_overflow at 0.
"0x82206550" = { name = "ms_obj_spawn_sprite_child" }     # (parent?, child_node r4, ...): link a child sprite/cel node into the parent's depth-sorted tree (wrapper over ms_obj_tree_insert_child, copies field +0xb4). Used by ms_anim_apply_current_frame to instantiate a frame's cel.
# (B) A SECOND, simpler witness — an animated entity whose cel is a direct
#     function of a per-object frame TIMER (not a script): cel = celSeqTable[
#     frame_timer / duration ], frame_timer at [obj+0xC0]+0x08 (a per-tick u8
#     counter, range-checked 0..20), duration = 10, celSeqTable = the static u16
#     table at 0x8201A5B0. Same conclusion: the cel is a function of TIME, never
#     of pose+0x18/+0x1c.
"0x8224bd40" = { name = "ms_obj_handler_8224bd40" }       # animated entity (combined update+draw node+0x08 handler): emits its cel via add_sprite with r4 = celSeqTable[0x8201A5B0][ frame_timer/10 ], frame_timer = [obj+0xC0]+0x08. A clean P5 witness that the cel index is driven by a per-object frame timer, independent of pose position.

# ---------------------------------------------------------------------------
# OBJECT-TREE DRAW/UPDATE WALK — the per-object dispatch (RE'd 2026-06-24, P2 in
# MSXX_60FPS_FUNCTION_TARGETS.md: "the loop that actually drives the per-entity
# add_sprite producers").
#
# This is the "bctrl-over-the-tree" the P2 target sought, but it is NOT a classic
# for-loop: it is a CURSOR-DRIVEN, CONTINUATION-CHAINED dispatch.
#
#   * Each object node carries its HANDLER as a direct function pointer at
#     node+0x08 (the SAME field ms_obj_is_tree_sentinel tests; the list-end
#     sentinel's handler is 0x822060D8, a terminator). A freshly-allocated node
#     defaults to the no-op handler ms_obj_handler_null (0x82206980); the
#     per-entity-TYPE handler is installed at node+0x08 by that type's spawn fn
#     (representative pair below: ms_obj_spawn_822090c8 installs handler
#     ms_obj_handler_822090c8). Type handlers are also tabulated in the
#     entity-type handler table in data (e.g. slot 0x82BD6EA8 = 0x82209570).
#
#   * ms_obj_draw_dispatch_step (0x822068F8) is ONE step of the walk: it reads
#     the global draw cursor [0x82DCCB08] (current node), sets up the render
#     anchor (0x82200140/0x82200020/0x82200040), calls the node's handler
#     (node+0x08) via bctrl, then advances the cursor to node+0x14 (next
#     sibling). A guard (0x82581D20 on 0x82CF1DA0) can skip the dispatch and
#     advance-only. Object handlers tail-call BACK into 0x822068F8 (e.g. the
#     scene-object handler at 0x8224FAF0 ends in `bl 0x822068F8; blr`), so a
#     single kickoff chains through the whole depth-sorted sibling list.
#
#   ADDRESS-CORRECTION NOTE: the object-pool/walk bookkeeping block is at base
#   0x82DCCB00 — count @0x82DCCB04, draw cursor @0x82DCCB08, free-pool head
#   @0x82DCCB0C, in-callback flag @0x82DCCB10 (all via `lis -32035`=0x82DD0000
#   then a negative disp, e.g. -13556 -> 0x82DCCB0C). Earlier comments in this
#   file that cite "0x82DDCB04/08/0C/10" for the pool head / live count are OFF
#   BY +0x1000; the true addresses are 0x82DCCB04/08/0C/10. Use these when
#   hooking the cursor for interpolation.
#
# CONSEQUENCE FOR 60fps (the P2 deliverable — "is DRAW separable from UPDATE?"):
# NO. Each entity's node+0x08 handler is a COMBINED update+draw method (it both
# advances the object's state AND emits its sprite via ms_render_list_add_sprite)
# and the cursor dispatches it exactly ONCE per walk. There is no draw-only
# re-entry point per object. So the off-frame re-pass cannot simply "re-run the
# draw walk" (that would re-run the sim). The viable off-frame seams remain (a)
# lerp at the EMIT/flush side ms_render_emit_sprite_quad (P4) over the already-
# built list, or (b) lerp pose inside ms_render_list_add_sprite AND have the
# producers re-fire -- which requires re-running these combined handlers, i.e.
# it is NOT free. This refines P1's "force a draw-only re-pass" note: the scene
# render path (ms_scene_render) only RE-FLUSHES the pre-built list; it does not
# re-invoke these producer handlers.
"0x822068f8" = { name = "ms_obj_draw_dispatch_step" }     # one step of the object draw/update walk: set render anchor (0x82200140/20/40), call current cursor node's handler (node+0x08) via bctrl, advance cursor [0x82DCCB08] to node+0x14. Handlers tail-chain back here, so one kickoff draws the whole sibling list. Guarded by 0x82581D20 on 0x82CF1DA0 (advance-only when it fails).
"0x82206980" = { name = "ms_obj_handler_null" }           # default no-op object handler (lone blr); node+0x08 default for a fresh node until its type's spawn installs the real handler
"0x82209570" = { name = "ms_obj_spawn_822090c8" }         # spawn for the debug object viewer below: installs handler 0x822090c8 at node+0x08 (0x82209678: stw of 0x822090c8), registers the object in the spatial grid (0x82238400), then runs the handler once. Reached via the entity-type handler table @0x82BD6EA8.
# CORRECTION (P3, 2026-06-24): 0x822090c8 is NOT a typical gameplay entity — it is
# the DEBUG OBJECT/ANIMATION VIEWER. Decoded field-by-field: it drives an "edit
# record" at [obj+0xC0] from d-pad/button globals (0x82D7BA10/BA30/BA50, per-bit),
# cycles a type index in [0,198] and feeds it to ms_obj_set_type (so it previews
# EVERY entity type), nudges per-object draw offsets, toggles flip flags, and
# sprintf's a status line. It is still a real add_sprite PRODUCER, so it is a clean
# isolated specimen for P3 — but the universal interpolate/snap RULE comes from
# ms_render_list_add_sprite (0x82236BB8) itself, which is type-agnostic, not from
# this one handler. (P2's "representative producer" framing was thus imprecise.)
"0x822090c8" = { name = "ms_obj_handler_822090c8" }       # debug object/animation viewer handler (a COMBINED update+draw producer): edits an [obj+0xC0] record from input globals, picks the entity type to preview (ms_obj_set_type), commits the pose (ms_pose_apply 0x8223e838), then emits the sprite via ms_render_list_add_sprite at 0x82209484 (r4 = preview frame index, r5/r6 = draw offset + camera). One of the producers ms_obj_draw_dispatch_step bctrl's per node.

# ---------------------------------------------------------------------------
# Spatial / collision HASH-GRID manager (RE'd 2026-06-23). NOTE: clarifies the
# earlier "object free-list" mention in the interpolation notes — that free-list
# is the GRID-CELL-NODE pool at worldmgr+0xC00 (3072), NOT the object pool (the
# object pool is [0x82DDCB0C], above). The grid is an array of 32 cell records
# (64 bytes each: four list-heads at +0x08/+0x18/+0x28/+0x38, {next@0, prev@4,
# rec@8, ...}) embedded at the start of the worldmgr; an object references up to
# 4 cells via a slot array at obj+0x2c (occupancy count at obj+0x29, max 4). The
# worldmgr singleton is the deref of [0x82D7B120]; the cell-node free list head
# is at worldmgr+0xC00. ms_world_advance_scroll (0x82238628) drives the rebuild.
"0x822381f8" = { name = "ms_grid_release_cell_node" }     # unlink one cell node from its cell list and push it onto the worldmgr+0xC00 free list (marks node fields 2/4 = 0xffff, 7 = 2)
"0x82238258" = { name = "ms_grid_reset_all_cells" }       # iterate the grid's 32 cell records (stride 64, four list-heads each) releasing every populated node back to the worldmgr+0xC00 free list
"0x82238400" = { name = "ms_grid_register_object_cell" }  # allocate a cell node from the worldmgr+0xC00 free list and link an object into the grid cell for a given coordinate; records the cell in the object's obj+0x2c slot array (count obj+0x29, capped at 4); logs on pool exhaustion
"0x822385b8" = { name = "ms_grid_unregister_object" }     # remove an object from every grid cell it occupies (walks the obj+0x2c slot array, count obj+0x29)
"0x822383f0" = { name = "ms_grid_clear_object_slots" }    # zero an object's cell-node slot count (obj+0x29 = 0); called by ms_obj_init

