"0x823EA548" = { name = "ms_scene_transition_dispatch_pending_descriptor" } # phase-8 pending-descriptor path; uses 0x82574378/0x82574428 before type-7/8 dispatch, fallback probe returns bool

# --- PRODUCER-WALK ENTRY + frame re-entry (Blocker 1, RE'd 2026-06-24) ---
# Resolves "which callee runs the build, and where the per-frame clear happens". The
# producer DRAW walk runs on the cooperatively-scheduled RENDER TASK FIBER, not inline.
# The render-list manager deref is [0x82D7B13C] (lwz -20164(0x82D80000)); the scene
# DRAW/PHASE state lives in a SEPARATE struct at 0x82D7D5E0.. with the key bytes
# 0x82D7D615 (draw-state: 0=build/init, 1=run producer walk, >1=other) and 0x82D7D659
# (scene phase 0..4). Do not confuse the two structs.
"0x823e4378" = { name = "ms_render_task_fiber" }       # the scheduler-driven RENDER TASK main loop (a cooperative fiber; loops forever). Waits on the ready flag [0x82D2A8B0] via ms_task_scheduler (0x823dfa28), then per iteration: ms_pump_render_queue (present barrier) -> bctrl the render-task object's vtable+0x14 ([0x82D41B40]) -> ms_render_task_draw_frame (0x823dfef0, the producer walk + present) -> set rendered flag [0x82D2A8B4]=255 + increment the counter at [0x82D2A860] (the same word P6 attributes to ms_render_frame -- both touch it; reconcile the exact cadence via a trace if it matters) -> ms_task_scheduler yield -> repeat. THIS is the "scheduler-driven render task" ms_pump_render_queue waits on. The producer build (ms_obj_draw_dispatch_step) is reached from here, which is why producers decouple (30Hz) from present (60Hz).
"0x823dfef0" = { name = "ms_render_task_draw_frame" }  # render-task per-frame body: inits scene-build state ([0x82DBA508]/[0x82DB94A8]=-1), dispatches the scene phase ([0x82DD00E0]), calls ms_scene_logic_step (0x8237dac8), then runs the DRAIN LOOP at 0x823dff98 -> { ms_pump_render_queue ; bctrl an object's vtable+0x10 ([0x82D41A70]) ; ms_scene_draw_dispatch_thunk (0x82204ce0) } while the dispatcher returns nonzero. This is where the per-object node handlers (e.g. ms_obj_handler 0x8224faf0) chain through ms_obj_draw_dispatch_step (0x822068f8) and emit the sprite list.
"0x822500b0" = { name = "ms_scene_draw_dispatch" }     # the PRODUCER-WALK DISPATCHER. Reads draw-state byte [0x82D7D615]: ==1 -> call ms_obj_draw_dispatch_step (0x822068f8, one walk step) and return 1; ==0 -> the BUILD/INIT path (0x822500f0: zero scene-build state [0x82D7D5E0..E3], advance, dispatch sub-init handlers 0x8224fa68.. on [0x82D7D659]); >1 -> 0x822501ec. Returns nonzero while there is more draw/build work, so the drivers loop on it.
"0x82204ce0" = { name = "ms_scene_draw_dispatch_thunk" } # lone `b 0x822500b0` (tail-thunk into ms_scene_draw_dispatch); called from the render-task drain loops 0x823dffb8 / 0x8237dbd4.
"0x8237dbc8" = { name = "ms_scene_draw_drain" }        # tiny driver: `while (ms_scene_draw_dispatch_thunk() != 0) ;` -- drain the producer walk to completion in one shot (used outside the present-interleaved render-task loop).
"0x8237dac8" = { name = "ms_scene_logic_step" }        # per-frame scene LOGIC/update step (called from ms_render_task_draw_frame @0x823dff64): copies scene-config bytes, ms_sound/anim setup (0x8223ea90), polls input twice (0x821f2370 or 0x821f2298 by scene mode), sets [0x82D7D636]=1, then runs the game-logic substeps 0x82205a80 / 0x82204d28 / 0x82204b60. (Update side; the draw walk is the dispatcher above.)
"0x8223c6c8" = { name = "ms_scene_substate_step" }     # per-frame scene SUB-STATE machine (called by ms_scene_update @0x82250bd0; result stored to scene_sub+0x0c). Reads scene phase [0x82DD00E0] + flags ([0x82D7BA66], 0x82239748, 0x82249fe8, 0x82227588) and returns the next sub-state byte. DEFAULT/common return = 1 (0x8223c810) -> drives ms_scene_update to finish the current frame and return; returns 0 only on rare non-advancing sub-steps (loop-back), or a transition code via 0x823ea6c8.
"0x821f1888" = { name = "ms_scene_should_exit" }       # ms_scene_update per-frame predicate (called @0x82250bbc): nonzero -> take the teardown exit 0x82250c58 (-> ms_scene_phase_reset_draw 0x82236618 + return); zero -> continue the frame.
"0x82236678" = { name = "ms_scene_phase_step" }        # scene-PHASE state machine (NOT a render-list fn): dispatches on phase byte [0x82D7D659] (0..3), walks the 4-entry table at [0x82D7BA30] (8-byte stride) testing flag bit 0x08, advances via 0x822398d8/0x82248cf0/0x82250220, and on completion calls ms_scene_phase_reset_draw (0x82236618). Called once per frame from ms_scene_update @0x82250bc8.
"0x82236618" = { name = "ms_scene_phase_reset_draw" }  # set draw-state byte [0x82D7D615]=0 (back to the BUILD phase) and remap the scene phase byte [0x82D7D659] to its next value via a small switch (1/2/3 -> next; >3 is a no-op early return). Called from ms_scene_phase_step and the ms_scene_update teardown exit (0x82250c7c).
"0x8224faf0" = { name = "ms_obj_scene_root_handler" }  # node+0x08 handler dispatched by the producer walk: rebuilds the global HUD node tree (ms_build_global_node_tree 0x82206ad0) and seeds draw state each frame, sets [0x82D7D63B]|=0x80, then TAIL-CHAINS into ms_obj_draw_dispatch_step (0x822068f8 @0x8224fbf8) so a single kickoff walks the whole sibling list (continuation-chained dispatch; see Priority 2 in the MD).

# ---------------------------------------------------------------------------
# PHASE COUNTER / present cadence (RE'd 2026-06-24, P6). Chosen phase source and
# the full analysis are in MSXX_60FPS_FUNCTION_TARGETS.md. The three candidates:
#   [0x82D29BA2]  PASS COUNT (=2) -- the loop bound/divisor in ms_update_and_render_frame
#                 (reset to 2 on exit). The phase DENOMINATOR, not a counter.
#   [0x82D2A860]  GLOBAL FRAME COUNTER -- sole writer ms_render_frame (0x823F9C78),
#                 bumped once per pass (~60Hz); also latches a "rendered" flag=255 at 0x82D2A8B4.
#   [0x82D44174]  SW VBLANK COUNTER -- sole writer ms_vblank_handler (0x8245E2F0),
#                 incremented at hw vblank (true 60Hz display clock); also drains the
#                 vblank-deadline callback ring at gpu_base+0x420C/+0x4210.
# Present is VBLANK-LOCKED: the swap is scheduled into that ring by
# ms_gpu_request_vblank_swap (below) => one present == one vblank. CHOSEN phase =
# r31 / [0x82D29BA2] (pass index / pass count), both live in ms_update_and_render_frame.
# ---------------------------------------------------------------------------
"0x8245E408" = { name = "ms_gpu_request_vblank_swap" }   # GPU buffer-swap request: derefs the global device ptr ([0x8200092C]/[0x82000930]), bumps the swap-pending count at gpu_base+0x4184, computes a refresh-rate-based deadline from the vblank counter [gpu_base+0x4174], and inserts a deadline entry into the vblank-callback ring (gpu_base+0x420C) that ms_vblank_handler drains -> the present is gated to hardware vblank. No static callers (reached via a registered kernel/callback ptr). Proof the swap is vblank-locked (P6).

# ---------------------------------------------------------------------------
# 60fps interpolation map (RE'd 2026-06-23/24). The world->screen transform path.
# Chosen seam + the capture/replay plan + the exact midasm injection points are
# in MSXX_60FPS_FUNCTION_TARGETS.md. Reference layout:
#
# Object world position (decoded from ms_render_list_add_sprite):
#   obj+0x88  -> pose ptr (lwz r8,136(r31)); the renderer reads position from here:
#       pose+0x18  world X (16.16; renderer lhz reads the integer halfword @ 0x82236c34)
#       pose+0x1c  world Y (16.16; lhz @ 0x82236c20)
#       pose+0x20/+0x24  PREV-tick committed X/Y (snapshot by ms_pose_commit) -- the
#                  native lerp endpoint; current = +0x18/+0x1c.
#       pose+0x29  flip flags (lbz @ 0x82236c40; bit0 hflip, bit1 vflip; each -1 to
#                  stay pixel-aligned after mirror)
#   Camera globals the transform subtracts: 0x82D74750 X / 0x82D74754 Y. RESOLVED:
#   their only writer is ms_camera_reset (zeroes them) -> renderer camera is a
#   CONSTANT 0, and callers pre-add it to a per-caller offset so it cancels. => for
#   interpolation the camera is a non-issue; interpolate pose+0x18/+0x1c only.
#   Screen transform: sx = (poseX - camX) + argR5 ; sy = (camY - poseY) - argR6 + 240.
#   CAVEAT: a SECOND copy of this transform lives in ms_render_set_anchor
#   (0x82200070) -- the interpolation hook must cover it too.
#
# SEAM: ms_render_list_add_sprite (0x82236BB8), the universal world->screen
# chokepoint (50+ call sites). Midasm hook @ 0x82236c38 (X in r3, Y in r5, pose in
# r8) lerps prev->current by phase; see the MD.

# Camera / scroll smoothing. Runs once per scene update before the object pass.
"0x82238628" = { name = "ms_world_advance_scroll" }  # smooths the camera scroll toward its target (worldmgr+0x2404, 1/32-subpixel units) and writes the integer pixel scroll to [0x82D89AA0/A2/A4] (x/y/z >>5); then rebuilds the per-object collision/spatial grid. worldmgr singleton ptr is the global at 0x82D7B120 (sibling of the render-list mgr ptr at 0x82D7B13C). (Output addr corrected 2026-06-23: lis -32039 + -25952 = 0x82D89AA0, NOT 0x82D99AA0; all readers agree.)

# --- camera / scroll command API (RE'd 2026-06-23) ---
# The visible camera move is an *eased* "world scroll" living on the worldmgr
# singleton (deref of [0x82D7B120]; base = lis -32040 + -20192). The scroll
# sub-struct is at worldmgr_deref+0x2404 and is what ms_world_advance_scroll
# plays out one step per scene update:
#   +0x00/02/04  current scroll X/Y/Z   (>>5 of this is emitted to 0x82D89AA0/A2/A4)
#   +0x06/08/0A  target delta X/Y/Z     (stored <<8 by ms_scroll_set_target)
#   +0x0C/0E/10  per-step easing increment (target_delta / steps)
#   +0x12        remaining step count   (decremented each tick by ms_world_advance_scroll)
#   +0x14        active flag
#   +0x1A..0x2F  22-byte saved-state backup (push/pop)
#   +0x2C (off 0x2430)  mode byte        +0x30 (off 0x2434)  saved flag
# This is the camera-motion driver: for the 60fps goal, the eased scroll between
# its endpoints is exactly the kind of motion that wants render-time interpolation
# (backgrounds + whole playfield ride this camera). See MSXX_RUNTIME_NOTES.md.
"0x82237e00" = { name = "ms_scroll_set_target" }     # (dx,dy,dz each clamped to ±31, steps): command an eased camera scroll; fills +6/8/10 target, computes +0xC/0xE/0x10 per-step increment (delta/steps), sets +0x12 step count
"0x82237d50" = { name = "ms_scroll_save_state" }     # memcpy the 22-byte scroll state (worldmgr+0x2404) into the +0x241A backup and set the saved flag (+0x2434=1)
"0x82237d98" = { name = "ms_scroll_restore_state" }  # restore the scroll state from the +0x241A backup and clear the saved flag; re-seeds the current pos when no scroll is in progress
"0x82237d30" = { name = "ms_scroll_set_mode" }       # store a byte to worldmgr+0x2430 (scroll mode/lock, adjacent to the scroll state)
"0x82237d40" = { name = "ms_scroll_get_mode" }       # read the worldmgr+0x2430 scroll mode/lock byte

# Per-player position record accessor (RE'd 2026-06-23; 93 call sites -- a core
# accessor). Returns &g_player_pos_record[index]: index 0 -> 0x82D73F20, else
# 0x82D73F28 (two 8-byte records, {x@+0 s16, y@+2 s16, ...}; written together by
# the setter at ~0x822A4EE0). MSXX is 2-player co-op, so these are the two
# players' tracked positions; a likely camera-follow / HUD input. Relevant to
# the camera question above: if the live camera is derived anywhere, it is from
# these, not from 0x82D74750 or 0x82D89AA0.
"0x822A5390" = { name = "ms_get_player_pos_record" }  # (index r3) -> &g_player_pos_record[index] (0->0x82D73F20, else 0x82D73F28)

# Renderer camera (0x82D74750 X / 0x82D74754 Y — the globals the world->screen
# transform in ms_render_list_add_sprite subtracts) and the parallax layers.
# No per-frame writer to 0x82D74750/4754 was found; movement is carried by the
