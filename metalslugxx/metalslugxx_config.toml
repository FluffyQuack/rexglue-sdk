# [Game] SkipLogos — skip the boot logo sequence.
#
# ms_boot_logo_sequence (sub_82571500) plays three logos back to back (XBLA
# "Arcade", US-only ESRB, SNK Playmore "Vendor"), each as "load the texture,
# then a `while (tick() == 996 /*busy*/)` fade-in/hold/fade-out wait loop", then
# runs teardown/transition code at 0x82571700 that sets up the title scene.
#
# DON'T jump over the whole display region: the per-logo load + the first tick
# initialize draw state the later loading-screen/title transition reuses (an
# early attempt to `goto 0x82571700` crashed with a null-deref in the "Loading…"
# render). Instead, let each logo run its load and exactly ONE tick, then bail
# out of the wait loop. One tick advances the fade to t≈0 (alpha≈0, so the logo
# is effectively invisible) and does all the per-logo init the transition needs;
# bailing skips only the multi-second fade-in/hold/fade-out wait.
#
# Each hook sits on the loop-back `beq cr6,<loop_top>` after a tick call and,
# when msxx_skip_boot_logos() (metalslugxx_hooks.cpp, reads [Game] SkipLogos) is
# true, jumps to the instruction just past the loop instead of looping again.
# When false the loop runs normally (the hook is a cheap bool read per frame).
#
# XBLA "Arcade": tick 0x8256F420; loop 0x82571600; exit -> 0x82571610.
[[midasm_hook]]
address = 0x8257160C
name = "msxx_skip_boot_logos"
after_instruction = false
jump_address_on_true = 0x82571610

# ESRB (US only): tick 0x8256F700; loop 0x82571680; exit -> 0x82571690.
[[midasm_hook]]
address = 0x8257168C
name = "msxx_skip_boot_logos"
after_instruction = false
jump_address_on_true = 0x82571690

# SNK Playmore "Vendor": tick 0x8256FA20; loop 0x825716F0; exit -> 0x82571700.
[[midasm_hook]]
address = 0x825716FC
name = "msxx_skip_boot_logos"
after_instruction = false
jump_address_on_true = 0x82571700

