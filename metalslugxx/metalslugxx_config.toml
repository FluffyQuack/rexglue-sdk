# Mission 5 stream dispatcher crash.
#
# The table at 0x82014FF4 has five valid entries. Auto-detection previously
# truncated the local bctr sites in sub_822CC498 to cases 0 and 1; after those
# were fixed, Mission 5 reached sibling same-table dispatch and selected entry 1
# (0x822CC4C0). That target is a valid chunk entry, not a standalone auto-found
# function, so it is registered above and the remaining bctr sites are tabled
# here. The bctrl sites still use REX_CALL_INDIRECT_FUNC today, so they rely on
# the 0x822CC4C0 chunk registration.
# ---------------------------------------------------------------------------
[[switch_tables]]
address = 0x822CC490
register = 11
labels = [0x822CC498, 0x822CC4C0, 0x822CC8D8, 0x822CC4F8, 0x822CC560]

