# data). This is not enemy-only: players, projectiles, effects, and enemies all
# feed the same active hitbox machinery. The enemy-list-adjacent part is the pair
# of 128-entry active object buffers at 0x82D7BDE0 / 0x82D7BA80, each with a
# count at +0x350 and per-group/bucket bitsets before the object-pointer rows.
# Per-object collision state lives in the base object around +0x8C/+0x90/+0x94/
# +0x95/+0xAA/+0xAC/+0xAD/+0xB8.
"0x82211340" = { name = "ms_obj_collision_state_reset" } # clear one object's collision damage/descriptor/list-slot state (+0x8C/+0x90/+0x94/+0x95/+0xAA/+0xAC/+0xAD/+0xB8).
"0x82211378" = { name = "ms_collision_active_list_clear" } # clear one 0x350-byte active hitbox buffer: zero count at +0x350 and all bucket/group bitset words.
"0x822113B0" = { name = "ms_collision_clip_hitbox_to_bucket_range" } # project an object's hitbox rect to screen/bucket coordinates, clip against the 320x240 playfield-expanded range, and return 1 when fully outside.
"0x822114A8" = { name = "ms_collision_apply_global_hit25_gate" } # optional global hit gate: when enabled and the collision descriptor remaps id 25 to nonzero, mark obj hit code 25 and suppress active-list registration.
"0x82211548" = { name = "ms_obj_collision_has_hit_code" } # return whether obj+0xAA has a nonzero pending/applied collision hit code.
"0x82211558" = { name = "ms_collision_force_buffer_a_reset_flag" } # set the reset/debug flag byte for one active collision buffer (0x82D7BDDC) to 0xFF.
"0x82211568" = { name = "ms_collision_force_buffer_b_reset_flag" } # set the reset/debug flag byte for the sibling active collision buffer (0x82D7C948) to 0xFF.
"0x82211578" = { name = "ms_collision_buffer_b_reset_flag_is_set" } # boolean test of the latched active-buffer reset flag mirrored at 0x82D7C136.
"0x82211590" = { name = "ms_obj_collision_set_flag80" } # set obj+0xAC bit7; many entity handlers use it to tag collision participation/state.
"0x822115A0" = { name = "ms_collision_test_rect_against_player_hitbox" } # choose player 0/1 by r5, resolve that player's collision descriptor at obj+0x90, and test a caller rect against the player's hitbox.
"0x82211720" = { name = "ms_collision_debug_draw_hitbox_rect" } # draw one object-relative hitbox rect after flip and camera adjustment; used by the collision table tick and debug paths.
"0x82211818" = { name = "ms_collision_set_object_slot_record" } # add/update/remove an object in the 256-entry {obj, hitbox-record} table at 0x82D7C140; stores the slot index in obj+0xB8 low bits.
"0x822118B8" = { name = "ms_obj_collision_side_flag_is_active" } # inspect obj+0xB8 side/edge flags and pose direction to return whether the relevant collision-side flag is active.
"0x82211900" = { name = "ms_collision_scan_slot_table_for_edges" } # scan the 256-slot hitbox table against the current camera/playfield bounds, set obj+0xB8 edge bits, and return side flags for the caller.
"0x82211C40" = { name = "ms_obj_collision_clear_edge_flags" } # clear the collision edge bits in obj+0xB8 while preserving the low slot index.
"0x82211C50" = { name = "ms_obj_collision_ack_edge_flags" } # consume/clear collision edge bits in obj+0xB8 and update the global edge accumulator at 0x82D7CAC8.
"0x82211CB8" = { name = "ms_collision_accumulate_object_bucket_weights" } # add weighted coverage for an object's screen-space position into the 16x16-ish collision occupancy buckets at 0x82D7C960.
"0x822121C0" = { name = "ms_collision_resolve_hit_pair" } # apply one source/target hit result: update target damage/code/state fields, track min/max hit depths, trigger player/effect side effects, and call the hit callback path.
