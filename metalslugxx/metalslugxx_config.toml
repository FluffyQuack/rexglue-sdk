# ---------------------------------------------------------------------------
# GAMEPLAY LOGIC TICK — the sim-step seam (RE'd 2026-06-24, on the 60fps path).
#
# This is the per-step gameplay update: the function the sim advances each logic
# tick, which moves entities and so is the CAPTURE side of the planned 30Hz-sim ->
# 60fps render-time interpolation. (The render side / lerp point is
# ms_render_list_add_sprite 0x82236BB8; this is where the prev/current pose
# snapshot it lerps would be taken.)
#
# ms_gameplay_tick (0x822491f8) is called by the stage-state handlers around
# 0x8224a/b/cxxx (named in the function-size map below) and runs a fixed SEQUENCE of subsystem
# updates, ending in ms_camera_compute_view_floats (0x821F4FE0, already named) so
# the view is rebuilt after the world has advanced one step. Its mirror is
# ms_gameplay_init (0x82248920, called by the three entry/reset states
# 0x8224A0B8/0x8224A4C8/0x8224AF28), which RESETS the same subsystems
# (each *_init below pairs 1:1 with a *_tick) and seeds the playfield
# CENTER 160,120 (= 320/2, 240/2) into the stage controller at 0x82D39B74
# (+0x08 = 160, +0x10 = 120) plus both player records via ms_player_record_init.
# The init/tick pairing is proven field-level for the collision tables:
# ms_gameplay_init clears the 256-entry table at 0x82D7C140 that
# ms_collision_tick_tables walks.
#
# => For interpolation: snapshot every live object's pose {+0x18,+0x1c} on entry
# to ms_gameplay_tick (prev) and on exit (current); ms_render_list_add_sprite then
# lerps by the inter-tick phase. The subsystem list below says WHICH systems move
# entities, so the snapshot can bracket exactly the step that mutates pose.
#   *** SUPERSEDED by P3 (2026-06-24): no manual snapshot is needed. ms_pose_commit
#   (0x8223e600) ALREADY maintains the prev pos at pose+0x20/+0x24 (current at
#   +0x18/+0x1c), refreshed once per tick via the 0x82D74896 toggle. Read both
#   straight from the pose; see the POSE / TRANSFORM section above. This seam
#   (capture in ms_gameplay_tick) is now only a fallback. ***
"0x822491f8" = { name = "ms_gameplay_tick" }   # advance gameplay one logic step: sets player-active bits (sentinel-tests the two player objects 0x82BD3E58/0x82BD3F20 via ms_obj_is_tree_sentinel), runs the subsystem-update sequence below in order, then ms_camera_compute_view_floats. Called by the 0x8224bxxx stage state handlers. THE sim tick / interpolation capture seam.
"0x82248920" = { name = "ms_gameplay_init" }   # reset all gameplay subsystems (the *_init mirrors of the tick's subsystems); inits both player records (ms_player_record_init 0/1) and seeds the playfield center 160,120 into the stage controller at 0x82D39B74

# --- subsystem initializers, in the order ms_gameplay_init calls them ---
# These are the screen/gameplay-entry reset side of the tick functions below. They
# are useful 60fps anchors because entering a new room/screen should snap any
# interpolation state, not blend across the reset.
"0x8228b9d8" = { name = "ms_init_player_objects_for_gameplay" }   # reset both player root objects (0x82BD3E58/0x82BD3F20) via ms_player_root_reset, then clear their tracked-object links via 0x82236D40
"0x82205338" = { name = "ms_sound_reset_event_slots" }            # clear the 15 sound-event slots at 0x82DDCC60 (slot bytes +0x0c/+0x0d, timer +0x0e, id=-1), then reset the packed sound-event dispatcher through 0x821F4688(0)
"0x82211e38" = { name = "ms_collision_init_tables" }              # clear the 256-entry collision slot table at 0x82D7C140 plus the active buffers, bucket bitsets, reset flags, and side tables used by ms_collision_tick_tables.
"0x82233e98" = { name = "ms_init_obj_screenpos_buffers" }         # reset the two small screen-position buffers at 0x82D8B4C0/0x82D8B140 (six 0x90-byte-spaced entries each) before ms_tick_compute_obj_screenpos starts filling them
"0x8229a3f0" = { name = "ms_init_loop_sound_99" }                 # reset continuous sound-event 99 state (0x82D39CF0 block + edge byte 0x82D73F2F) before ms_tick_loop_sound_99 edge-drives ARC_SE arcse041
"0x8229f378" = { name = "ms_init_loop_sound_114" }                # reset continuous sound-event 114 state (0x82D39D30 block + edge byte 0x82D73F2E) before ms_tick_loop_sound_114 edge-drives event 114
"0x82219e18" = { name = "ms_init_oddframe_gate" }                 # zero the two alternating-frame gate counters at 0x82D7B9A0+0x60 / 0x82D7B920+0x60; ms_tick_oddframe_gate clears one side based on vblank parity
