# converged epilogue (0x8220714C) restores it. Sprite/backdrop X+Y sync also needs the
# off-pass camera lerp in msxx_fps_render_frame_driver. Gated FpsInterpolate +
# g_replaying, so the real frame is untouched. Diagnostics/tuning: MSXX_FPS_BG_SNAPPX /
# _DEBUGPX / _DIAG.
