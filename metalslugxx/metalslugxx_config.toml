# Playfield render/upscale path (RE'd for the 3.0x pixel scale patch).
# The game renders into a 320x240 target, doubles that through a 640x480
# intermediate, then draws the intermediate into a letterboxed screen-space quad.
# The final quad calculation originally reserves 5% top/bottom margin, producing
# a centered 864x648 viewport; see the [[midasm_hook]] below.
# Global state wrapper 0x823E7920 passes &0x82C0B204 to the helpers below.
# Key state fields: +0x04 scene color RT surface, +0x08 saved color RT surface,
# +0x0C scene depth/stencil surface, +0x10 saved depth/stencil surface,
# +0x14 320x240 sampled scene texture/RT, +0x1C 640x480 intermediate texture/RT,
# +0x20 upscale vertex shader, +0x2C/+0x30 source size (320x240).
# Guest-side source redirect hook points for the Buffer-B 60fps path:
#   0x823E6DA8 calls ms_d3d_set_texture with r5=[state+0x14], programming the
#   320x240 scene source fetch before ms_upscale_playfield_to_640x480.
#   0x823E73C0 calls ms_d3d_set_texture with r5=[state+0x1C], programming the
#   640x480 intermediate source fetch before the final/front quad at 0x823E7664.
"0x823E6948" = { name = "ms_render_create_texture2d_out" }         # adapter around ms_d3d_create_texture2d; stores the returned handle through the caller's out pointer
"0x823E69A0" = { name = "ms_render_create_surface_out_stub_a" }    # render-surface creation adapter around ms_d3d_create_render_surface
"0x823E69F8" = { name = "ms_render_create_surface_out_stub_b" }    # paired render-surface creation adapter with the same call shape as 0x823E69A0
"0x823E6A50" = { name = "ms_render_get_color_target_out" }         # adapter around ms_d3d_get_render_target; stores the current color target through an out pointer
"0x823E6A98" = { name = "ms_render_get_depth_stencil_out" }        # adapter around ms_d3d_get_depth_stencil_surface; stores the current depth/stencil target through an out pointer
"0x823E6AE0" = { name = "ms_render_clear_target_zero_ret" }        # adapter around ms_d3d_clear; forces the extra clear argument to 0 and returns success
"0x823E6B08" = { name = "ms_render_create_descriptor_resource_out" } # adapter around ms_render_create_resource_from_descriptor; used by descriptor-backed shader/resource setup
"0x823E6BA8" = { name = "ms_render_resource_release_tail" }        # tail wrapper into ms_render_resource_release
"0x823E6BB8" = { name = "ms_init_playfield_upscale_state" }       # zeroes the playfield state block; default source size = 320x240
"0x823E6BF8" = { name = "ms_destroy_playfield_upscale_state" }    # releases playfield state resources (+0x04/+0x0C/+0x18/+0x1C/+0x20)
"0x823E6C70" = { name = "ms_create_playfield_upscale_targets" }   # creates the sampled 320x240 source texture/RT (+0x14), 640x480 intermediate (+0x1C), and upscale vertex shader (+0x20)
"0x823E6D00" = { name = "ms_bind_playfield_upscale_draw_state" }  # binds source texture +0x14 via ms_d3d_set_texture at +0xA8, then upscale vdecl/PS/VS before the 320->640 quad
"0x823E6DF0" = { name = "ms_upscale_playfield_to_640x480" }       # draws the 320x240 source into the 640x480 intermediate
"0x823E6F00" = { name = "ms_restore_playfield_saved_targets" }    # binds saved color/depth surfaces (+0x08/+0x10) and clears the present-ready byte
"0x823E70A0" = { name = "ms_present_draw_aux_textured_quads" }    # optional present-side overlay called from ms_present_playfield_upscale when [[0x82D41B40]+0x280] is set; binds globals 0x82D2EE04/0x82D2EE08 and emits two screen-space textured quads before the final +0x1C source bind
"0x823E7310" = { name = "ms_present_playfield_upscale" }          # front/final upscale: re-runs 320->640 if ready, binds source +0x1C via ms_d3d_set_texture at +0xB0, draws the 1280x720-frame quad, then calls the post-viewport overlay
"0x823E7748" = { name = "ms_bind_playfield_saved_targets" }       # lightweight saved-target bind used by the render-task present/draw helper
"0x823E77A8" = { name = "ms_reset_playfield_present_state" }      # resets sampler/device state after helper draws and clears the present-ready byte
"0x823E7830" = { name = "ms_ensure_playfield_upscale_targets" }   # lazy init: snapshots current color/depth into +0x08/+0x10, creates scene color/depth surfaces at +0x04/+0x0C, then creates upscale targets
"0x823E7920" = { name = "ms_ensure_global_playfield_upscale_targets" } # tail wrapper for ms_ensure_playfield_upscale_targets(&0x82C0B204)
"0x823F8570" = { name = "ms_draw_playfield_post_viewport_overlay" } # receives the final viewport rectangle from ms_present_playfield_upscale, records it in globals, binds an overlay texture, and emits a quad

# Sound / XACT path (RE'd 2026-06-17 from the XAudio imports and XACT bank/cue
# object flow used by media\sounds\*.xgs/*.xsb/*.xwb). The game wraps a bundled
# XACT runtime: manager methods create wave/sound banks, allocate active cue
# objects, update per-cue parameters, and feed the XAudio render client.
"0x827D3DD8" = { name = "ms_xact_sound_manager_ctor" }              # constructs the XACT-backed sound manager; list heads, cue pools, and state fields
"0x827D38C0" = { name = "ms_xact_sound_manager_initialize" }        # initializes engine state, creates bank objects, and prepares the active-cue pool
"0x827D0AE8" = { name = "ms_xact_create_bank_from_memory" }         # creates a XACT bank object from a loaded buffer and stores the returned interface
"0x827D3BA0" = { name = "ms_xact_get_or_create_bank_entry" }        # finds/allocates a bank entry keyed by bank id; wires wave/sound bank handles
"0x827D3118" = { name = "ms_xact_create_playing_cue" }              # validates cue metadata, allocates a playing-cue object, and returns its handle
"0x827D33E8" = { name = "ms_xact_on_playing_cue_destroyed" }        # removes a cue object from the manager's active/reference lists on final release
"0x827D0BC8" = { name = "ms_xact_sound_manager_update" }            # polls XAudio voice-category volume, refreshes active cues, then advances XACT work
"0x827D7790" = { name = "ms_xact_cue_set_volume" }                  # updates a cue volume scalar and pushes it to the underlying XACT instance
"0x827D7848" = { name = "ms_xact_cue_set_variable_by_name" }        # updates a named XACT variable/RPC value on an active cue
"0x827D7930" = { name = "ms_xact_cue_play" }                        # starts/resumes an active cue and updates manager active-sample accounting
"0x827D7A98" = { name = "ms_xact_cue_stop" }                        # stops an active cue, propagating stop flags through child wave/cue objects
"0x827D8448" = { name = "ms_xact_cue_refresh_category_volume" }     # reapplies system voice-category volume to an active cue when XAudio volume changes
"0x82801F40" = { name = "ms_xaudio_register_render_client" }        # queries speaker config and registers the XAudio render-driver client callback
"0x82801AF8" = { name = "ms_xaudio_submit_render_frames" }          # render callback; submits 256 frames of six-float audio data to XAudio
"0x82801BE8" = { name = "ms_xaudio_unregister_render_client" }      # signals shutdown and unregisters the XAudio render-driver client
"0x82801D68" = { name = "ms_xaudio_render_client_ctor" }            # initializes render-client state, event handles, counters, and frame buffers

# Sound event and cue dispatch. Event 99 resolves to ARC_SE cue index 41,
# which is the XACT cue name "arcse041" used by the laser gun sound effect.
"0x823E4DB0" = { name = "ms_sound_resolve_bank_cue_name" }          # Bank id + cue index to XACT cue-name pointer; bank 0 cue 1 resolves to SE se001, bank 1 cue 41 resolves to ARC_SE arcse041
"0x823DF1C8" = { name = "ms_sound_resolve_packed_cue_name" }        # Unpack (bank << 12) | cue and resolve the XACT cue name
"0x8256C8E0" = { name = "ms_sound_play_bank_cue_in_slot" }          # Resolve a bank/cue, obtain the XACT cue, track it in a playback slot, and start it
"0x821F4620" = { name = "ms_sound_play_group_table_cue" }           # Sound-table wrapper; group 0 routes through ARC_SE, nonzero groups route through SE. Event 47 -> SE se001; event 99 -> ARC_SE arcse041.
"0x82205AE8" = { name = "ms_sound_enqueue_event" }                  # Queue a sound event record from 0x82BD1700; event 47 resolves to SE cue 1 (se001), events 42/99 resolve to ARC_SE cue 41.
"0x822056A8" = { name = "ms_sound_update_event_queue" }             # Drain queued sound events and dispatch record bytes +2/+3 to ms_sound_play_group_table_cue
"0x82205D30" = { name = "ms_sound_stop_event" }                     # Remove/stop an active sound event by event id
"0x82334AF0" = { name = "ms_laser_sound_start" }                    # Set the object's laser-sound bit, increment the active laser count, and enqueue event 99
"0x82334B30" = { name = "ms_laser_sound_stop" }                     # Clear the laser-sound bit and stop event 99 when the last active laser releases it

# ---------------------------------------------------------------------------
# 2D sprite / primitive rendering library.
#
# The game draws everything (pixel-art sprites + UI) as hardware quads into the
# 320x240 source target via a small wrapper over the Xbox 360 inline-draw API.
# Three layers, named below:
#
#   (1) Device wrapper  — the D3DDevice_BeginVertices/EndVertices/SetTexture
#       inline helpers (out-of-line in this build). Device object is the global
#       at [gpu_base+0x1304] (=[0x82D41304]), passed as r3 to every call.
#   (2) Cached resource binders — resolve a guest resource handle, set the GPU
#       state only if it changed, and cache the current value at [gpu_base+...].
#   (3) Immediate-mode primitives + the textured-sprite batch system.
#
# All three layers were identified by their BeginVertices(prim,count,stride)
# signatures and vertex writes. Xbox D3DPRIMITIVETYPE: 3=LINESTRIP, 6=TRIANGLEFAN,
# 8=RECTLIST, 13=QUADLIST. Names only (codegen auto-sizes)

# (1) Device wrapper (inline D3D draw primitives).
"0x82435B20" = { name = "ms_d3d_create_texture2d" }       # create a renderable/sampled texture resource; used for the 320x240 scene and 640x480 intermediate
"0x82435C40" = { name = "ms_d3d_create_render_surface" }  # create a color/depth surface object; ms_ensure_playfield_upscale_targets stores these at state+0x04/+0x0C
"0x82439218" = { name = "ms_d3d_get_render_target" }      # AddRef and return the current color render target slot (r4 = color index)
"0x82439260" = { name = "ms_d3d_get_depth_stencil_surface" } # AddRef and return the current depth/stencil surface
"0x8243A840" = { name = "ms_d3d_set_render_target" }      # SetRenderTarget(r4 color index, r5 surface); setup_playfield_target passes state+0x04
"0x82439F58" = { name = "ms_d3d_set_depth_stencil_surface" } # SetDepthStencilSurface(r4 surface); setup_playfield_target passes state+0x0C
"0x8243CCC0" = { name = "ms_d3d_begin_vertices" }   # D3DDevice_BeginVertices(prim r4, count r5, stride r6); reserves space in the command/ring buffer, returns the vertex write pointer in r3
"0x8243CC88" = { name = "ms_d3d_end_vertices" }     # D3DDevice_EndVertices; commits the reserved vertices ([dev+0x30] = [dev+0x3554])
"0x82435EC0" = { name = "ms_d3d_set_texture" }      # D3DDevice_SetTexture(sampler r4, texture r5); copies the texture object's fetch constants into the device sampler block and writes the sampler resource slot at (r4+3180)*4
"0x82436050" = { name = "ms_d3d_get_texture" }      # D3DDevice_GetTexture(sampler r4); returns the current sampler texture from (r4+3180)*4 and AddRefs it before returning
"0x824383F0" = { name = "ms_d3d_set_sampler_mag_filter" } # sampler filter state wrapper; upscale bind path passes 0 for point sampling, final/front path later passes 1
"0x82438598" = { name = "ms_d3d_set_sampler_min_filter" } # sampler filter state wrapper paired with ms_d3d_set_sampler_mag_filter
"0x82436A88" = { name = "ms_d3d_set_alpha_blend_enable" } # blend-control wrapper; r4=1 enables source-alpha blending, r4=0 disables it. finish_playfield_render disables this after the real scene pass.
"0x8243B7D8" = { name = "ms_d3d_resolve_texture" }  # resolve/copy the current EDRAM render target into texture r6; finish_playfield_render resolves to +0x14, 320->640 resolves to +0x1C
"0x8243FF18" = { name = "ms_d3d_clear" }            # D3DDevice_Clear wrapper; setup_playfield_target clears the scene RT after binding it
"0x82445FB8" = { name = "ms_render_create_resource_from_descriptor" } # descriptor-backed resource allocator; ms_create_playfield_upscale_targets uses it for the upscale vertex shader/resource at state+0x20
"0x824333A8" = { name = "ms_texture_calc_tiled_alloc_units" } # texture/surface sizing helper; aligns dimensions/format and returns 0x1400-byte tiled allocation units
"0x82434D40" = { name = "ms_render_init_texture_resource" } # initialize a sampled texture resource object and its six fetch-constant dwords; ms_d3d_create_texture2d uses this for state+0x14/+0x1C
"0x82435038" = { name = "ms_render_init_surface_resource" } # initialize the render-surface sibling resource object; used by ms_d3d_create_render_surface for color/depth targets
"0x82434440" = { name = "ms_texture_get_level_desc_raw" } # fill a texture level descriptor from a raw texture resource + mip level; decodes width/height/format fields from the packed fetch constants
"0x82435D78" = { name = "ms_texture_get_level_desc" } # public texture descriptor query; follows wrapper resources to ms_texture_get_level_desc_raw when needed, otherwise decodes the texture object directly
"0x8244A770" = { name = "ms_render_resource_add_ref" } # atomic render-resource AddRef helper; paired with ms_render_resource_release and used by ms_d3d_get_texture
"0x8244B9D0" = { name = "ms_render_resource_release" } # refcounted render resource release; decrements the atomic count and runs final cleanup on zero

# (2) Cached GPU resource binders (resolve handle -> object, set if changed).
# pixel/vertex shader split is by adjacent device offsets 0x3248 / 0x3244.
"0x8256A060" = { name = "ms_gfx_bind_vertex_declaration" }  # set vertex declaration at dev+0x2ED8 if changed; cached at [gpu_base+4880]
"0x8256A0B8" = { name = "ms_gfx_bind_pixel_shader" }        # set pixel shader at dev+0x3248 if changed; cached at [gpu_base+4884]
"0x8256A120" = { name = "ms_gfx_bind_vertex_shader" }       # set vertex shader at dev+0x3244 if changed; cached at [gpu_base+4888]

# (3a) Immediate-mode 2D primitives (bind shaders, BeginVertices/EndVertices in
# one shot; solid-color vertex format, no texture).
"0x823F6A70" = { name = "ms_draw_fill_rect" }      # RECTLIST(3 verts) solid-color filled rectangle; input r3 = {x0,y0,scale,x1,y1}
"0x823F6B58" = { name = "ms_draw_rect_outline" }   # LINESTRIP(5 verts) solid-color rectangle outline
"0x823F6C90" = { name = "ms_draw_color_quad" }     # TRIANGLEFAN(4 verts) quad with per-vertex color; input = 4 x {color,x,y,_} records
"0x823F6DB8" = { name = "ms_draw_line" }           # LINESTRIP(2 verts) solid-color line segment

# (3b) Textured sprite batch system. Sprites are packed records flushed as
# RECTLIST/QUADLIST quads; batches are split per texture/blend mode.
"0x823F72B8" = { name = "ms_draw_sprite_batch" }      # main sprite renderer: (sprite_array r3, count r4) -> RECTLIST(stride 28: pos,color,uv); binds current texture from the -11899/-11900 slots
"0x823F72A8" = { name = "ms_set_sprite_blend_mode" }  # store the current sprite blend/material select (0..2) at [0x82D2D185]; read by ms_draw_sprite_batch
"0x823F77B0" = { name = "ms_build_palette_texture" }  # build/refresh a CLUT palette texture (256x256) from a source palette; 4-bit nibble expansion into a locked surface
"0x823F79E0" = { name = "ms_set_active_palette" }     # store the active palette/sprite-list buffer pointer at [0x82D2D194]
"0x823F8068" = { name = "ms_sprite_refresh_dirty_texture_pages" } # worker for the sprite texture-page uploader: lazily creates 128x128 page textures, locks each dirty page, expands indexed sprite bytes through the palette table into ARGB, unlocks, and records elapsed/status in the upload slot.

# (3c) Deferred per-texture quad queue (auto-flushes when the texture changes).
"0x823F7C30" = { name = "ms_queue_textured_quad" }   # (quad r3, texture r4); append a textured quad to the queue, flushing first if the texture differs
"0x823F79F0" = { name = "ms_draw_quad_list" }        # flush the queued quads: bind shaders+texture, BeginVertices QUADLIST(13, stride 28) over the 0x54-byte records, reset count
"0x823F7C10" = { name = "ms_reset_quad_list" }       # zero the queued-quad count ([..DAF0]) and current-texture ([..DAEC])
"0x823F8030" = { name = "ms_flush_quad_list" }       # ms_draw_quad_list then ms_reset_quad_list
"0x823F8338" = { name = "ms_draw_sprite_page_rect" } # immediate textured RECTLIST draw: bind point-sampled sprite shaders + texture page r4, convert the packed rect/UV record at r3 into 3 stride-28 vertices, then EndVertices.
"0x823F8520" = { name = "ms_set_quad_modulate_color_raw" } # store a prepacked ARGB modulate color at [0x82C0B28C]; ms_set_quad_modulate_color is the byte-pack wrapper.
"0x823F8550" = { name = "ms_get_quad_modulate_alpha" }     # return the high/alpha byte from the current packed quad modulate color.
"0x823F8560" = { name = "ms_sprite_alloc_index_buffers_thunk" } # tiny tail-call wrapper into ms_sprite_alloc_index_buffers.
"0x823F8770" = { name = "ms_select_present_overlay_texture" }   # bounds-check a 0..6 overlay slot and copy its texture handle into the active present-overlay globals.
"0x823F87A0" = { name = "ms_draw_selected_present_overlay" }     # draw the selected present-overlay texture as an immediate fullscreen/page rect, then unbind texture slot 0.

# (3d) Dynamic vertex/index buffer pool used by the sprite batcher.
"0x823F6EA8" = { name = "ms_sprite_alloc_index_buffers" }  # lazily create the 8 dynamic index buffers ([0x82D2D174] array) and reset batch write state
"0x823F71A8" = { name = "ms_sprite_build_quad_indices" }   # allocate the dynamic vertex buffers and fill the static quad index buffer (6 indices/quad, up to 4096 quads)
"0x823F6F70" = { name = "ms_sprite_flip_dynamic_buffer" }  # flush+swap the active dynamic buffer (double-buffer toggle at [0x82D2D184])
"0x823F7048" = { name = "ms_sprite_append_indices" }       # append a quad's 16-bit indices to the locked dynamic index buffer

# (3e) Higher-level direct sprite/page draw frontends.
"0x822031A8" = { name = "ms_background_clear_tile_sprite_map" } # clear the 40x32-stride halfword background/tile map at 0x82D7CB40; called by the scene build path before the direct tile batch renderer.
"0x822031D0" = { name = "ms_background_draw_tile_sprite_batches" } # BACKGROUND/TILE PASS: called from ms_scene_render @0x822508A4; scans the 0x82D7CB40 tile map, builds packed sprite records in 128-entry chunks, flushes them through ms_draw_sprite_batch, then draws the small solid overlay rect pass.
