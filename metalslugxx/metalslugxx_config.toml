# ---------------------------------------------------------------------------
# Phase D, pass 1: resolve compile errors of the form
# "use of undeclared label 'loc_XXXX'" in the generated recomp TUs. Root cause:
# two real, independently-called functions OVERLAP and share a common tail
# (epilogue / out-of-line case bodies). Auto-discovery bounded the lower-address
# function short, so its forward branches into the shared tail were recorded as
# internal-label *targets* but the tail blocks themselves were claimed only by
# the higher-address function and never emitted in the lower one -> dangling
# goto. The SDK's documented remedy (function_graph.cpp containsAddress: CONFIG
# size is trusted for "out-of-line switch cases after the epilogue") is to give
# the lower function an explicit CONFIG size spanning the whole shared extent so
# discoverBlocks follows the forward branches and emits its own copies of the
# tail blocks. The higher function still emits independently (overlap is fine;
# loc_ labels are C-function-local). Boundaries read from the basefile disasm.
#
#   recomp.56  sub_828BE7E8 shares its 0x828BEC98..0x828BED50 tail with the
#   separately-called sub_828BE938 (0x828BE938, 8 call sites). Missing labels:
#   loc_828BEC98 / loc_828BED38 / loc_828BED3C / loc_828BED50. Next real
#   function is sub_828BED60, so size = 0x828BED60 - 0x828BE7E8 = 0x578.
"0x828BE7E8" = { size = 0x578, name = "sub_828BE7E8" }    # shares tail w/ sub_828BE938

# Entry 1 in the Mission 5 stream jump table lands in the middle of the
# 0x822CC498 dispatcher. Other table users reach it through indirect bctr/bctrl,
# so it needs to be registered as an overlapping callable chunk.
"0x822CC4C0" = { size = 0x34, name = "ms_mission5_stream_dispatch_cont" }

# ---------------------------------------------------------------------------
# Phase E, run 3 fix: resolve W1. After Run 2 (callback recovery)
# the boot got through both logos and trapped at a *stable* W1 guard —
# "[FATAL] Unresolved call from 0x8242AC30 to 0x8242D230" (logs 006/007). The
# Phase C note speculated W1 might be a runtime-materialized fragment needing a
# [[midasm_hook]]; disassembling the target proved otherwise. 0x8242AC30 is a
# lone `b 0x8242D230` trampoline (flanked by .long 0 padding), and 0x8242D230 is
# a complete, self-contained **context-swap** routine (a user-mode fiber/
# coroutine switch): it saves the full outgoing register file (r1, r14-r31, CR,
# LR, f14-f31, VMX128 v64-v127, psq f0-f31) to the current context buffer at
# [[r13+0x100]+0x164], restores the incoming context from r3, stores r3 as the
# new current context, then tail-calls the scheduler at 0x82B3B1CC. It is reached
# ONLY through the trampoline's `b` (no `bl`, no static pointer, no lis/addi
# materialization), so the call-graph, vtable, and callback scanners all miss it
# — same category as the Phase C tail-call gaps, just a plain branch. Fix is the
# same: register it as a CONFIG function so the trampoline's tail-call resolves.
# Body ends at the tail `b 0x82B3B1CC` (0x8242D638); next real fn is 0x8242D640
# after one .long 0 pad, so size = 0x8242D63C - 0x8242D230 = 0x40C.
#
# Run 5 update: the W1 size hint was correct and necessary, but it
# only made the trampoline branch *resolve* — the recompiled ctx_swap body is
# itself unsound (see the [rexcrt] section below). This entry is RETAINED because
# the [rexcrt] redirect needs a graph node at 0x8242D230 to rename+exclude (the
# node exists only because of this CONFIG entry; without it the trampoline `b`
# is unresolved again). The `name` here is superseded by the rexcrt rename.
"0x8242D230" = { size = 0x40C, name = "ctx_swap_8242D230" }   # fiber/coroutine context switch (W1; redirected via [rexcrt])

# ---------------------------------------------------------------------------
# Phase E, run 5 fix: the post-logo SILENT native crash.
#
# Run 4 added a symbolizing crash handler; Run 5 produced the backtrace
# (logs/metalslugxx_009.log):
#   access violation reading 0x0000000100000000 (= guest address 0, since the
#   guest membase is host 0x100000000) in sub_825713E0 (a `lwz r11,0(r31)`
#   vtable load with r31 == 0), called from sub_82569B80 <- sub_823FB7E0 <- xstart.
#
# Root cause: COOPERATIVE FIBER CONTEXT SWITCHING, modeled wrong by static recomp.
#   - 0x8242D230 (ctx_swap, the W1 routine) is XAPILIB's *internal* fiber context
#     switch: it saves the full outgoing register file to the current fiber buffer
#     and restores the incoming one from r3, keying "current fiber" off
#     KTHREAD.fiber_ptr (KTHREAD+0x164, reached via [[r13+0x100]+0x164]). The game
#     uses the standard XAPI fiber API: ConvertThreadToFiber/CreateFiber allocate
#     a 2640-byte (0xA50) fiber context == the SDK's X_FIBER_CONTEXT *exactly*.
#   - The game's task scheduler (sub_823DFA28) drives the switch by calling the
#     ctx_swap trampoline (0x8242AC30) DIRECTLY with r3 = target fiber context.
#   - On hardware, ctx_swap restores the incoming context's LR/r1/nonvolatiles and
#     tail-branches into KeSetCurrentStackPointers, whose final `blr` resumes the
#     incoming fiber at its saved LR (a *non-local* transfer to another call
#     chain). The recomp can't do that: it lowers the tail-branch to a normal C++
#     call `__imp__KeSetCurrentStackPointers(ctx); return;`, so it unwinds the
#     HOST stack back into the caller (sub_82571340's epilogue) while `ctx` now
#     holds the INCOMING fiber's r1/r31. The epilogue's `ld r31,-16(r1)` reads the
#     wrong stack -> r31 becomes garbage/0 -> the later vtable `lwz r11,0(r31)`
#     dereferences guest 0 -> the silent AV. (No REX_FATAL, so no log line.)
#
# Fix: redirect the entire XAPILIB fiber family to the SDK's host-fiber-backed
# hooks (src/kernel/crt/threading.cpp), which preserve the C++ call stack across a
# switch via rex::thread::Fiber. The game only ever passes the opaque fiber handle
# around (it never reads the register save area), and X_FIBER_CONTEXT matches the
# game's layout byte-for-byte, so this is a clean drop-in. All five must be
# redirected together so creation, teardown, and the switch all agree on the
# host-fiber registry:
#   ConvertThreadToFiber = 0x8242AA10  (allocs 2640B ctx, sets KTHREAD.fiber_ptr)
#   ConvertFiberToThread = 0x8242AAA0  (clears fiber_ptr, frees ctx)
#   CreateFiber          = 0x8242AAF0  (stack/start/param; MmCreateKernelStack)
#   DeleteFiber          = 0x8242ABD0  (MmDeleteKernelStack; self-delete handled)
#   SwitchToFiber        = 0x8242D230  (== ctx_swap, the internal switch; r3 =
#                                       target fiber, the exact rexcrt_SwitchToFiber
#                                       lpFiber arg. The scheduler's trampoline
#                                       `b 0x8242D230` now lands on the host hook.)
# codegen renames each node to rexcrt_<name> and excludes it from recompilation,
# so the SDK hook is linked in its place (mechanism: [rexcrt] table, config.cpp).
[rexcrt]
ConvertThreadToFiber = 0x8242AA10
ConvertFiberToThread = 0x8242AAA0
CreateFiber          = 0x8242AAF0
DeleteFiber          = 0x8242ABD0
SwitchToFiber        = 0x8242D230

