# ---------------------------------------------------------------------------
# Mid-ASM hooks
# ---------------------------------------------------------------------------

# [Game] Integer playfield scale (only when [Graphics] GameUpscaleFilter = Point).
#
# ms_present_playfield_upscale (0x823E7310) computes four FP registers before it
# emits the final playfield quad:
#   f31 = left, f30 = top, f28 = right, f27 = bottom
#
# Stock:  (208, 36) -> (1072, 684), i.e. 864x648 == 2.7x from 320x240.
# Point patch: (160, 0) -> (1120, 720), i.e. 960x720 == 3.0x from 320x240.
[[midasm_hook]]
address = 0x823E7664
name = "msxx_force_integer_playfield_scale"
registers = ["f31", "f30", "f28", "f27"]
after_instruction = false

# [Graphics] Scoped playfield filtering.
#
# GameUpscaleFilter is intentionally no longer a global SDK sampler override:
# menu/UI draws should keep the game's own bilinear filtering. While the real
# ms_render_frame pass is inside ms_scene_render, force the game's min/mag
# sampler wrapper arguments to the requested playfield filter (Point=0,
# Linear=1). The off-pass 60fps replay calls the same begin/end helpers around
# its direct ms_scene_render import in metalslugxx_hooks.cpp.
[[midasm_hook]]
address = 0x823F9CB4
name = "msxx_begin_playfield_scene_filter_scope"
after_instruction = false

[[midasm_hook]]
address = 0x823F9CB8
name = "msxx_end_playfield_scene_filter_scope"
