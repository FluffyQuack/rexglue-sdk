# ---------------------------------------------------------------------------
# Render-list submit-state / "anchor" effect cluster (RE'd 2026-06-23, on the
# 60fps path; the 0x82200xxx neighbours of ms_render_list_insert_sprite 0x82200170).
#
# ms_render_list_insert_sprite's body (0x82200280+) applies an optional per-sprite
# secondary/"anchor" effect: gated on a flag, it positions/alpha-fades a sprite
# relative to a captured ANCHOR object's screen position. Most sprite types get
# it; types 43/45/167/168/174 are excluded. The small functions below set/clear
# that state. Two render-state globals (both adjacent to the per-frame draw
# counter 0x82DAA61C):
#   0x82DAA620  anchor-enable flag (insert_sprite skips the anchor block if 0)
#   0x82DAA628  final per-sprite alpha-scale gate (read in the closing alpha math)
# Anchor cluster (set together by ms_render_set_anchor): 0x82DCEA54 (r4 param),
#   0x82DCEA56 (screen X), 0x82DCEA58 (anchor object ptr), 0x82DCEA5C (screen Y).
#
# RELEVANCE TO INTERPOLATION: ms_render_set_anchor (0x82200070) RE-IMPLEMENTS the
# full world->screen transform from ms_render_list_add_sprite (reads pose at
# obj+0x88: poseX @+0x18, poseY @+0x1c, flip @+0x29; subtracts camX/camY; +240 /
# Y-flip). It is the SECOND copy of that transform in the image — any hook that
# interpolates the add_sprite transform must mirror the change here.
"0x82200070" = { name = "ms_render_set_anchor" }            # (obj r3, r4): capture obj + its computed screen X/Y into 0x82DCEA54/56/58/5C (2nd copy of the add_sprite world->screen transform); skipped when obj is the tree sentinel
"0x82200040" = { name = "ms_render_reset_anchor" }          # zero the anchor cluster 0x82DCEA54/56/58/5C (no anchor active)
"0x82200030" = { name = "ms_render_clear_anchor_enable" }   # clear the anchor-enable flag 0x82DAA620 (=0); insert_sprite then skips the anchor block
"0x82200140" = { name = "ms_render_enable_alpha_scale" }    # set the per-sprite alpha-scale gate 0x82DAA628 (=1)
"0x82200150" = { name = "ms_render_disable_alpha_scale" }   # clear the per-sprite alpha-scale gate 0x82DAA628 (=0)

# ---------------------------------------------------------------------------
# Display-object / entity BASE CLASS (RE'd 2026-06-23, on the 60fps path).
#
# This is the base class for every renderable game object: the EXACT struct
# ms_render_list_add_sprite (0x82236BB8) consumes. Proof = the base ctor
# ms_obj_init (0x82206190) writes precisely the fields add_sprite reads:
# +0x1e/+0x1f = 255 (the per-frame counters), +0x20/+0x22 = 256, +0x40 = 255,
# +0x32 = 0xffff, +0x2a = 1, +0x2b = 255, +0x24 = 0.
#
# Objects live in a DEPTH-SORTED doubly-linked tree (z-order): sort key = the
# u16 at node+0x1c, sibling links node+0x10 (prev) / node+0x14 (next), parent at
# node+0x18. Each node owns an embedded POSE sub-struct (pointer at node+0x88;
# for the global nodes the pose is embedded at node+0x5C). Pose world position is
# **16.16 fixed-point**: pose+0x18 = X, pose+0x1c = Y, each written as value<<16
# (see ms_set_global_node_position), and the renderer's `lhz pose+0x18/+0x1c`
# reads the HIGH (integer) halfword. => sub-pixel precision is already in the
# data model — directly relevant to the 60fps render-time interpolation goal.
#
# Objects are allocated from a FREE POOL: head pointer [0x82DDCB0C], live count
# [0x82DDCB04]. Slots are recycled on destroy (ms_obj_destroy), so raw object
# pointers ARE reused across frames — this is the recycling the interpolation
# snapshot map must key around (needs a spawn/generation id, not the pointer).
# No per-object generation counter was found in the base ctor; the pool head +
# count above are the concrete recycling mechanism. See MSXX_RUNTIME_NOTES.md.
"0x82206190" = { name = "ms_obj_init" }                   # base display-object/entity ctor; sets every render-visible default add_sprite reads; inits the embedded pose + sub-objects reached via node+0x58
"0x822062f8" = { name = "ms_obj_dtor_unregister" }        # dtor body: spatial-grid unregister (0x822385b8) + 0x82240468
"0x82206330" = { name = "ms_obj_depth_compare" }          # compare two nodes' u16 depth/sort keys (node+0x1c); returns 0/255
"0x82206350" = { name = "ms_obj_is_tree_sentinel" }       # test node+0x08 against the depth-tree sentinel vtable (list-end check)
"0x822063a0" = { name = "ms_obj_tree_insert_child" }      # pop a node from the free pool [0x82DDCB0C], set depth = parent(node+0x1c)+1, link as a child of r11 in the sorted sibling list; bumps live count [0x82DDCB04]
"0x82206430" = { name = "ms_obj_tree_insert_child_tail" } # tail-link variant of ms_obj_tree_insert_child (inserts via the parent's +0x14 link)
"0x822065b8" = { name = "ms_obj_tree_find" }              # walk the depth-sorted sibling list to find the node matching a key (+0x1c) and ptr (+0x08)
"0x82206600" = { name = "ms_obj_destroy" }                # full teardown: run the node+0xC callback list (bctrl), grid-unregister (0x822385b8) + 0x82240468, unlink from the depth tree, recycle child nodes back to the pool, decrement live count
"0x82206718" = { name = "ms_obj_pool_overflow" }          # pool-exhaustion / error path; longjmp via 0x82581A00
"0x82206768" = { name = "ms_obj_tree_first" }             # return the first (lowest-depth) node in a sorted sibling list
"0x822067c0" = { name = "ms_obj_tree_count" }             # count the nodes in a sorted sibling list
# Global scene-graph / HUD draw-node singletons built over the same base class.
"0x82206988" = { name = "ms_init_global_node" }           # construct one global draw node (embedded pose at node+0x5C), seed the default+current global-node ptr [0x82CF26DC]
"0x82206ad0" = { name = "ms_build_global_node_tree" }     # construct the whole global draw-node tree (HUD/scene-graph singletons) and link them depth-sorted
"0x82206a48" = { name = "ms_set_global_node_position" }   # set the current global node's pose X/Y as 16.16 (r3<<16 -> pose+0x18, r4<<16 -> pose+0x1c) and mark dirty ([0x82CF24DC] = -1)
"0x82206a08" = { name = "ms_reset_current_global_node" }  # reset the current global draw-node ptr [0x82CF26DC] to the default (0x82BD3E58)
"0x82206a20" = { name = "ms_get_current_global_node" }    # return the current global draw-node ptr [0x82CF26DC] (or the default 0x82BD3F20 when r3&1)

# Sprite child / render-flag helpers (RE'd 2026-06-26). These feed the add_sprite
# path by preparing the per-object render flags, anchor position, and child pose.
"0x8221F920" = { name = "ms_obj_toggle_hflip" }                 # xor obj+0x24 bit0; consumed by add_sprite and by child relative-offset mirroring
"0x8221F930" = { name = "ms_obj_toggle_vflip" }                 # xor obj+0x24 bit1; consumed by add_sprite and by child relative-offset mirroring
