# ---------------------------------------------------------------------------
# Entity render list (the per-frame sprite display list). (RE'd 2026-06-23.)
#
# Sitting ABOVE the immediate-mode sprite library above, this is the layer the
# game logic talks to: each frame is cleared, every visible game object submits
# its sprite(s) into priority-sorted layer buckets, then the whole list is
# drained and emitted as textured quads through ms_queue_textured_quad/
# ms_draw_sprite_batch. The list manager is a single global struct reached via
# the pointer at [0x82D7B13C]; key fields (manager-relative):
#   +0x5400  current entry counter (per pass)
#   +0x5402  layer/entry count (u16; capacity 1536 = 0x600)
#   +0x4750  camera/scroll offset used for world->screen transform
#   +0x4800  sorted layer-index array (u16[]; iterated by the flush)
#   +0x32008 active bucket entry count
# Each layer record is 12 (0xC) bytes; each queued sprite entry is 0x68 bytes
# ({texture, params, quad-data}). The system was identified by following the
# producers/consumers of this struct and the calls into the sprite library.
#
# ---------------------------------------------------------------------------
# 0x68 SPRITE ENTRY + LAYER LAYOUT (RE'd 2026-06-24, P4). Full decode + the
# "no per-entry identity" verdict and its consequences for interpolation now live
# in MSXX_60FPS_FUNCTION_TARGETS.md. Field summary for reference:
#   LAYER RECORD (12 bytes, at mgr + layerIndex*12; layer-index array [mgr+0x4800],
#     count [mgr+0x5402]): +0x02 u16 sort/range, +0x04 u8 tex id, +0x05 u8 entry
#     count, +0x06 u8 layer alpha, +0x08 ptr entry-block base.
#   0x68 ENTRY (entry-relative, stride 0x68): +0x00 u16 sort key (copied to +0x02 by
#     ms_render_layer_stamp_texture), +0x02 u16 (emit r5), +0x04 u32 tex/palette id,
#     +0x08/+0x0C, +0x14/+0x18, +0x38/+0x3C... f32 baked vertex screen X/Y (POSITION,
#     absolute -- camera pre-applied), +0x1C u32 packed params (alpha bits 22..26 +
#     color), +0x20/+0x24, +0x50/+0x54/+0x58... f32 baked UVs / further coords.
#   => entry is a FULLY-BAKED world->screen float quad with NO object/pose back-ptr,
#   keyed only by layer-bucket + insertion order. Emit-side off-frame interp is NOT
#   viable; interpolate on the producer/pose side (native prev/current pair
#   pose+0x20/+0x24 vs +0x18/+0x1C). See the MD for the chosen capture/replay plan.
# ---------------------------------------------------------------------------
#
# --- producers: game objects -> render list ---
"0x82236BB8" = { name = "ms_render_list_add_sprite" }    # universal "submit object sprite" API (50+ call sites, one per entity type): transforms the object's world pos to screen via the camera offset at [mgr+0x4750], builds the entry, calls ms_render_list_insert_sprite
"0x82200170" = { name = "ms_render_list_insert_sprite" } # core insert (P4): takes screenX (r5), screenY (r6), sprite-id (r3), frame-record ptr (r4), obj back-ptr (caller stack +0x9c). Clips + scales to the active resolution (320x240 base), then EXPANDS the sprite into a fully-baked FLOAT QUAD (4 vertices, screen-space positions + UVs) written into a 0x68-byte entry in its priority/layer bucket. The world->screen transform (camera) is already applied by ms_render_list_add_sprite / ms_obj_anim_stream_emit_sprite, so the entry holds ABSOLUTE screen coords -- there is NO obj/pose back-pointer in the final entry (the obj r28 is used only at build time for the clip/scale/visibility decisions; it is NOT persisted). See the 0x68 ENTRY LAYOUT block below.
# Rotation note: ms_render_list_insert_sprite rotates each baked corner when the
# current rotation angle halfword is nonzero (0x82D8D672 on the main path, plus
# a mirrored variant at 0x82DBA4F8). It indexes the s16 sin/cos table at
# 0x8202FB10 with angle>>3 and applies ms_math_mul_fixed12_round to the four
# corner deltas before storing the final float vertices.
"0x821FC4E8" = { name = "ms_render_list_add_entry" }     # lighter append path (used by the UI/glyph renderer): bumps [mgr+0x5402], caps at 1536, fills one entry directly
# Coverage check (2026-06-26): the only direct `bl ms_render_list_add_entry`
# sites are 0x82202FF4 and 0x82203108, both inside ms_render_list_insert_sprite.
# ms_render_list_insert_sprite itself has only two direct callers: the original
# producer ms_render_list_add_sprite (0x82236D18) and the anim-stream producer
# ms_obj_anim_stream_emit_sprite (0x82238C0C). A raw basefile scan found no
# function-pointer table entry for 0x821FC4E8 (the lone byte hit at 0x821B9A40 is
# an `lwz` instruction). Once both producers are captured/bracketed, there is no
# visible third pose-sprite producer feeding top-level Entry ops at this layer.
"0x822389E0" = { name = "ms_obj_anim_stream_emit_sprite" } # second high-level sprite producer: parses one 7-byte anim-stream sprite command, r3 = object, r4 = command ptr, r5 = anim state; reads obj+0x88 -> pose+0x18/+0x1c (same current world XY as ms_render_list_add_sprite), applies camera 0x82D74750/4754 + pose flip fixups, then calls ms_render_list_insert_sprite. Converged exit/return-next-command point is 0x82238C10.
"0x82239160" = { name = "ms_obj_anim_stream_step" }        # per-object animation bytecode interpreter: r3 = object, r4 = anim stream state; dispatches opcodes, maintains state+0x00 current pc / +0x0e delay / +0x10 speed, and calls ms_obj_anim_stream_emit_sprite at 0x82239344 and 0x82239390.
"0x822396A0" = { name = "ms_obj_anim_stream_step_primary" } # wrapper for the object's primary anim state: if obj+0x58 is non-null, tail-calls ms_obj_anim_stream_step(obj, obj+0x58), otherwise returns 0.
"0x822795D0" = { name = "ms_player_register_body_sprite_cells" } # player body render registration helper: unregisters the current object cells, then registers the per-character torso/legs sprite cells from the halfword table passed in r4; the caller picks the normal/alternate table at 0x82BE025C/0x82BE028C.
"0x82279720" = { name = "ms_player_step_body_anim_stream" }       # player wrapper around ms_obj_anim_stream_step_primary: stages player body-part offsets/state through scratch 0x82D8B0A0, advances obj+0x58, then writes the updated torso/legs offsets back to the player state.
"0x822797A8" = { name = "ms_player_select_body_sprite_type" }     # maps the requested player body part/state (r4, usually state+0x32 after table remap) plus character id state+0x00 to an object sprite type and tail-calls ms_obj_set_type.
"0x822390F8" = { name = "ms_obj_anim_stream_set_sequence" } # initialize/reset obj+0x58 from the object's anim table at obj+0x34: selects sequence r4, stores initial command ptr(s), and seeds state+0x10 from r5.
"0x822389B8" = { name = "ms_obj_anim_stream_init_state" }   # initialize a standalone anim stream state: current/base command ptrs = r4, sequence/index field = r6, speed/delay seed = r5.
"0x82239048" = { name = "ms_obj_anim_stream_run_type_sequence" } # run a typed animation stream: validates/loads the obj template table entry at 0x82DB9560, resolves sequence r4, then invokes the nested stream scanner below with budget/count r5.
"0x82238E38" = { name = "ms_obj_anim_stream_scan_nested" }  # nested animation bytecode scanner used by ms_obj_anim_stream_run_type_sequence; skips/digests opcodes and calls ms_obj_anim_stream_emit_layer_batch for layer-list opcodes.
"0x82238D30" = { name = "ms_obj_anim_stream_emit_layer_batch" } # decode nested layer halfword lists into temp list 0x82D748A0 and call ms_render_layer_stamp_texture(0x82206DB0); not a pose sprite producer.
"0x82238928" = { name = "ms_obj_anim_cmd_toggle_hflip" }    # callback-table entry 0x82007CA0[0]: toggles obj+0x24 bit0 (sprite-command horizontal offset mirror) unless obj+0x06 == 7.
"0x82238950" = { name = "ms_obj_anim_cmd_toggle_vflip" }    # callback-table entry 0x82007CA0[1]: toggles obj+0x24 bit1 (sprite-command vertical offset mirror).
"0x82238968" = { name = "ms_obj_anim_cmd_store_word_b0" }   # callback-table entry 0x82007CA0[2]: reads four command bytes big-endian and stores the word at obj+0xB0.

