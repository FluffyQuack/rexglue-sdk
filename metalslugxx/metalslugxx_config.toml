# Metal Slug XX — codegen config (function/midasm hints).
#
# Included from metalslugxx_manifest.toml ([entrypoint].includes). Loaded by
# RecompilerConfig::LoadFromTable; [functions] entries register CONFIG-authority
# (immutable, exact-boundary) functions in the graph.
#
# ---------------------------------------------------------------------------
# Phase C, pass 1: resolve the 8 UnresolvedCall errors from the
# first codegen run. All 8 were `b <target>` (tail-call) instructions whose
# target the auto-scanner never placed in a function. Two root causes, both
# fixed by declaring explicit function boundaries:
#
#   (a) C++ adjustor thunks. Clusters of tiny `addi r3,r3,N ; b <method>`
#       thunks, where one thunk tail-calls a *sibling* thunk that is reached
#       only by that branch (no call / no PDATA / no fallthrough), so it was
#       never discovered. Declaring the sibling thunk as its own function
#       resolves the branch. (sites 1, 6, 7, and the 0x82888EF8 wrapper case.)
#
#   (b) Checked-iterator helpers with an internal back-edge loop. The function
#       entry is reached only by a far tail-call `b`, so no function was seeded
#       at the entry, leaving the whole body (incl. the back-branch target) in
#       an unclaimed gap. Declaring the enclosing function at its true entry +
#       size makes the back-branch target internal. (sites 3, 4, 5.)
#
# Sizes were read off the decrypted basefile disassembly
# (xex1tool -b + powerpc-none-elf-objdump, base 0x82000000).
# ---------------------------------------------------------------------------

[functions]
# (a) adjustor-thunk siblings reached only via a sibling thunk's tail-call.
"0x827E68D8" = { size = 0x04, name = "thunk_827E68D8" }   # b 0x827E2CB0
"0x827E3AA8" = { size = 0x04, name = "thunk_827E3AA8" }   # b 0x827E2CB0
"0x827E54A8" = { size = 0x04, name = "thunk_827E54A8" }   # b 0x827E2CB0
"0x827D4020" = { size = 0x08, name = "thunk_827D4020" }   # addi r3,r3,8 ; b 0x827D1D68

# (a) real function reached only via a wrapper's tail-call (b 0x82888EF8).
"0x82888EF8" = { size = 0x20, name = "sub_82888EF8" }     # list-insert helper, ends in blr

# (b) checked-iterator helpers; entry reached only by far tail-call, body holds
#     the internal back-branch target that was landing in an unclaimed gap.
"0x823DF850" = { size = 0x3C, name = "sub_823DF850" }     # back-edge target 0x823DF864
"0x8257F6D0" = { size = 0x38, name = "sub_8257F6D0" }     # back-edge target 0x8257F6E4
"0x8257F708" = { size = 0x38, name = "sub_8257F708" }     # back-edge target 0x8257F71C

# W2/W3 write-phase warning fix (2026-06-16): shared return fragments, not
# switch-table bodies. Register as tiny CONFIG helpers so conditional branches
# lower as conditional tail-calls instead of unresolved runtime guards.
"0x826A0A28" = { size = 0x0C, name = "msxx_hresult_fail_826A0A28" }  # HRESULT 0x80004005 return fragment used by 0x826A0A34
"0x827DEEF4" = { size = 0x08, name = "msxx_return_r11_827DEEF4" }     # `mr r3,r11 ; blr` return fragment used by 0x827DEEFC

